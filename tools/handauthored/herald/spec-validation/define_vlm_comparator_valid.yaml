id: define_vlm_comparator_valid
version: 2
standard: herald-spec
description: |
  Where Clause comparators must be valid (LT, LE, GT, GE, EQ, NE, IN, NOTIN).
scope:
  classes: []
  domains: []
check:
  all:
  - name: where_comparator
    operator: non_empty
  - name: where_comparator
    operator: not_in
    value:
    - LT
    - LE
    - GT
    - GE
    - EQ
    - NE
    - IN
    - NOTIN
outcome:
  message: VLM_COMPARATOR_VALID
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.10.1
  cited_guidance: |
    Comparator -- Required. 'LT','LE','GT','GE','EQ','NE','IN','NOTIN'.
  executability: predicate
  license: MIT
