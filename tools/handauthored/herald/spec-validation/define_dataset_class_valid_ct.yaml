id: define_dataset_class_valid_ct
version: 2
standard: herald-spec
description: |
  Class name must be a valid CDISC Controlled Terminology value for General Observation Class.
scope:
  classes: []
  domains: []
check:
  all:
  - name: class
    operator: non_empty
  - name: class
    operator: not_in
    value:
    - SPECIAL PURPOSE
    - INTERVENTIONS
    - EVENTS
    - FINDINGS
    - FINDINGS ABOUT
    - RELATIONSHIP
    - STUDY REFERENCE
    - TRIAL DESIGN
    - ASSOCIATED PERSONS
    - SUBJECT LEVEL ANALYSIS DATASET
    - BASIC DATA STRUCTURE
    - OCCURRENCE DATA STRUCTURE
    - ADAM OTHER
    - INTEGRATED SUBJECT LEVEL
    - DEVICE
outcome:
  message: DATASET_CLASS_VALID_CT
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.11.2
  cited_guidance: |
    Name -- Required. Text must follow CDISC Controlled Terminology for General Observation Class.
  executability: predicate
  license: MIT
