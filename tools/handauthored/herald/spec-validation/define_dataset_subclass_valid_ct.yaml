id: define_dataset_subclass_valid_ct
version: 2
standard: herald-spec
description: |
  SubClass must be a valid CDISC Controlled Terminology value when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: subclass
    operator: non_empty
  - name: subclass
    operator: not_in
    value:
    - TIME-TO-EVENT
    - ADVERSE EVENT
outcome:
  message: DATASET_SUBCLASS_VALID_CT
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.11.2.1
  cited_guidance: |
    def:SubClass -- Name must follow CDISC Controlled Terminology for SubClass.
  executability: predicate
  license: MIT
