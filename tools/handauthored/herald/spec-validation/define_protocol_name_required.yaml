  ProtocolName is required and must be non-empty in the Define sheet.
scope:
  classes: []
  domains: []
check:
  all:
  - name: ProtocolName
    operator: empty
outcome:
  message: PROTOCOL_NAME_REQUIRED
  severity: Error
