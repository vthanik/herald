id: define_derived_origin_predecessor_empty
version: 1
standard: herald-spec
description: |
  When a Variables-sheet row has Origin='Derived', the Predecessor column must be null. A derived variable has no single source record; the derivation is documented in Method, not Predecessor. Counterpart to HRL-DD-059 (which requires Method when Origin='Derived').
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: equal_to
    value: Derived
  - name: predecessor
    operator: non_empty
outcome:
  message: DERIVED_ORIGIN_PREDECESSOR_EMPTY
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1
    § 4.3.2
  authority: herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml
  executability: predicate
  license: MIT
