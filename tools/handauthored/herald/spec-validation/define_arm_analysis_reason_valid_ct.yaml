id: define_arm_analysis_reason_valid_ct
version: 1
standard: herald-spec
description: |
  AnalysisReason must use valid ADaM Controlled Terminology values when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: reason
    operator: non_empty
  - name: __reason_in_adam_ct
    operator: not_equal_to
    value: yes
outcome:
  message: ARM_ANALYSIS_REASON_VALID_CT
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: ARM 1.0
  cited_guidance: |
    P21 DD0099: Values for the AnalysisReason attribute are controlled by the Analysis Reason extensible codelist in ADaM CT.
  executability: predicate
  license: MIT
