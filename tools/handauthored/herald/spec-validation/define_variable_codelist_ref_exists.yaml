id: define_variable_codelist_ref_exists
version: 1
standard: herald-spec
description: |
  Codelist referenced by a variable must exist in the Codelists sheet.
scope:
  classes: []
  domains: []
check:
  all:
  - name: codelist_id
    operator: non_empty
  - name: __codelist_exists
    operator: not_equal_to
    value: yes
outcome:
  message: VARIABLE_CODELIST_REF_EXISTS
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.12.1
  cited_guidance: |
    CodeListOID -- Required. Must match the OID of a CodeList element in the same MetaDataVersion.
  executability: predicate
  license: MIT
