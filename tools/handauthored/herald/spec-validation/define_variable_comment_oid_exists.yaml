id: define_variable_comment_oid_exists
version: 1
standard: herald-spec
description: |
  Variable Comment ID must exist in the Comments sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: comment_id
    operator: non_empty
  - name: __comment_exists_in_cm_spec
    operator: not_equal_to
    value: yes
outcome:
  message: VARIABLE_COMMENT_OID_EXISTS
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.15
  cited_guidance: |
    def:CommentOID -- Must match the OID of a def:CommentDef element.
  executability: predicate
  license: MIT
