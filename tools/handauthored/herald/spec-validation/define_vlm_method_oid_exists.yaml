id: define_vlm_method_oid_exists
version: 1
standard: herald-spec
description: |
  ValueLevel Method ID must exist in the Methods sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: method_id
    operator: non_empty
  - name: __method_exists_in_mt_spec
    operator: not_equal_to
    value: yes
outcome:
  message: VLM_METHOD_OID_EXISTS
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.14
  cited_guidance: |
    MethodOID -- Reference to the unique ID of a MethodDef element.
  executability: predicate
  license: MIT
