id: define_variable_predecessor_required
version: 2
standard: herald-spec
description: |
  Predecessor field is required when Origin is 'Predecessor'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: equal_to
    value: Predecessor
  - name: predecessor
    operator: empty
outcome:
  message: VARIABLE_PREDECESSOR_REQUIRED
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 4.3.2
  cited_guidance: |
    Predecessor -- An entry that is copied from a variable in another dataset. The Description child element identifies the dataset and variable.
  executability: predicate
  license: MIT
