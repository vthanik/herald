id: define_dataset_purpose_valid
version: 2
standard: herald-spec
description: |
  Purpose must be 'Tabulation' for SDTM/SEND or 'Analysis' for ADaM.
scope:
  classes: []
  domains: []
check:
  all:
  - name: purpose
    operator: non_empty
  - name: purpose
    operator: not_in
    value:
    - Tabulation
    - Analysis
outcome:
  message: DATASET_PURPOSE_VALID
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: herald
  section: 5.3.11
  cited_guidance: |
    Purpose -- Required. 'Tabulation', 'Analysis'. For SDTM and SEND, use Tabulation. For ADaM, use Analysis.
  executability: predicate
  license: MIT
