id: '422'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: TRxxAGyN where xx is an integer [01-99, zero-padded] and y is an integer
  [1-9, not zero-padded]
define_element: ''
check:
  expand: xx,y
  all:
  - name: TRxxAGy
    operator: non_empty
  - name: TRxxAGyN
    operator: empty
outcome:
  message: On a given record, TRxxAGy is populated and TRxxAGyN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.4: There must be a one-to-one relationship between TRxxAGyN and TRxxAGy within a study.
    TRxxAGyN cannot be present unless TRxxAGy is also present. When TRxxAGy and TRxxAGyN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
