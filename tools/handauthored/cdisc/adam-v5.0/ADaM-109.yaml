id: '109'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.0'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: AVISITN
define_element: ''
check:
  expand: ''
  all:
  - name: AVISIT
    operator: is_not_unique_relationship
    value:
      related_name: AVISITN
      group_by: PARAMCD
outcome:
  message: Within a given value of PARAMCD, there is more than one value of AVISITN
    for a given value of AVISIT
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3.2.3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3.2.3, Table 3.2.3.1: Within a parameter,
    there is a one-to-one mapping between AVISITN and AVISIT so that AVISITN has the
    same value for each distinct AVISIT.'
