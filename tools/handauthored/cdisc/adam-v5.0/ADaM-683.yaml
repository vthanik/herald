id: '683'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: DEVICE LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: MODELGyN where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: MODELGy is populated
outcome:
  message: 'On a given record, MODELGy is populated and MODELGyN is not populated '
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0 3.2.1.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG-MD v1.0, Section 3.2.1.2: MODELGyN cannot be present unless MODELGy
    is also present. When MODELGy and MODELGyN are present, then on a given record,
    either both must be populated or both must be null.'
