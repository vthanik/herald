outcome:
  message: Within a given value of PARAMCD, there is more than one value of AVAL for
    a given value of AVALC, considering only those rows on which both variables are
    populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.3.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.3.4, Table 3.3.4.1: AVALC can be a character
    string mapping to AVAL, but if so there must be a one-to-one map between AVAL
    and AVALC within a given PARAM.'
