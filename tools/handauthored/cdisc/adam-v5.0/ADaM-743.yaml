- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: AVAL
define_element: ''
check:
  operator: is_not_unique_relationship
  name: AVALC
  value:
    related_name: AVAL
    group_by:
