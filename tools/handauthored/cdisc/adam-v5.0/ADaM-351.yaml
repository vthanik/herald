id: '351'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: AyHIC where y is an integer [1-99, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: AyHI
    operator: is_not_unique_relationship
    value:
      related_name: AyHIC
      group_by: PARAMCD
outcome:
  message: Within a parameter, there is more than one value of AyHIC for a given value
    of AyHI
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.3.7, Table 3.3.7.1: CDISC Notes for AyHIC
    state: "Within a given parameter, if there exists a row on which both AyHIC and
    AyHI are populated, then there must be a one-to-one mapping between AyHIC and
    AyHI on all rows on which both variables are populated."'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
