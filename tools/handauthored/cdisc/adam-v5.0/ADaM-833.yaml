  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADPPKIG v1.0, Section 3.2, Table 3.2: Unique numerical representation
    of DVID. Convention is normally 0=dose, 1=for the first observation of interest,
    etc. The numeric versions of the primary/character variables can be assigned from
    its corresponding character pair variable.'
