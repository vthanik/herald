  - BASIC DATA STRUCTURE
  - POPULATION PHARMACOKINETIC ANALYSIS
  domains: []
  exclude_domains: []
variable: DVID
define_element: ''
check:
  expand: ''
  all:
  - name: DVIDN
    operator: is_not_unique_relationship
