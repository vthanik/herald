id: '124'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.0'
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: PARCATy where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: PARAMCD
    operator: is_not_unique_relationship
    value:
      related_name: PARCATy
outcome:
  message: There is more than one value of PARCATy for a given value of PARAMCD
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3.2.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3.2.4, Table 3.2.4.1: A categorization of
    PARAM. For example, value of PARCAT1 might group the parameters having to do with
    a particular questionnaire, lab specimen type, or area of investigation.'
  source_version: '1'
