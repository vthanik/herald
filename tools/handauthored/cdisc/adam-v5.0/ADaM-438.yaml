id: '438'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: AVALCATy where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: AVALCAyN
    operator: non_empty
  - name: AVALCATy
    operator: empty
outcome:
  message: On a given record, AVALCAyN is populated and AVALCATy is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.4.1, Table 3.3.4.1.1: There must be a one-to-one relationship between AVALCAyN and AVALCATy within a parameter.
    AVALCAyN cannot be present unless AVALCATy is also present. When AVALCATy and AVALCAyN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
