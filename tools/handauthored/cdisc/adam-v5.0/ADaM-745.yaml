id: '745'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: BNRIND
define_element: ''
check:
  expand: ''
  operator: base_not_equal_abl_row
  b_var: BNRIND
  a_var: ANRIND
  group_by:
  - USUBJID
  - PARAMCD
  - BASETYPE
  basetype_gate: populated
outcome:
  message: BASETYPE is populated, BNRIND is populated, and BNRIND is not equal to
    ANRIND where ABLFL is equal to Y for a given value of PARAMCD and BASETYPE for
    a subject
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.3 3.3.4.1; 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.3, Section 3.3.4.1, Table 3.3.4.1.1: If used for any PARAM within a dataset, it must be non-null for all records for that PARAM within that dataset where either BASE or BASEC are also non-null.

    ADaMIG v1.3, Section 3.3.7, Table 3.3.7.1: ANRIND of the baseline record identified by ABLFL.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
