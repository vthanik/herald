id: '716'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: ALL
  domains: []
  exclude_domains: []
variable: '*TM'
define_element: ''
check:
  all:
  - operator: var_by_suffix_not_numeric
    name: stemTM
    exclude_prefix: EL
outcome:
  message: A variable with a suffix of TM is not a numeric variable excluding SDTM
    variables with a suffix of ELTM
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.1.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.1.2, Item 4: Variables whose names end in
    TM are numeric times'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
