id: '756'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: TRxxPGy where xx is an integer [01-99, zero-padded] and y is an integer
  [1-99, not zero-padded]
define_element: ''
check:
  operator: is_not_unique_relationship
  name: TRTxxP
  value:
    related_name: TRxxPGy
  expand: xx,y
outcome:
  message: Within a given value of TRTxxP, there is more than one value of TRxxPGy,
    where xx is an integer [01-99, zero-padded] and y is an integer [1-99, not zero-padded]
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.2, Table 3.2.4: TRxxPGy: Planned pooled
    treatment y for period xx. Useful when planned treatments (TRTxxP) in the specified
    period xx are pooled together for analysis according to pooling algorithm y. For
    example when in period 2 the first pooling algorithm dictates that all doses of
    Drug A (TR02PG1="All doses of Drug A") are pooled together for comparison to all
    doses of Drug B (TR02PG1="All doses of Drug B"). Each value of TRTxxP is pooled
    within at most one value of TRxxPGy.'
  source_version: '1'
