id: '488'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ONTRTFN
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: ONTRTFL is populated
outcome:
  message: On a given record, ONTRTFL is populated and ONTRTFN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.8
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.8, Table 3.3.8.1: There must be a one-to-one relationship between ONTRTFN and ONTRTFL within a dataset.
    ONTRTFN cannot be present unless ONTRTFL is also present. When ONTRTFL and ONTRTFN are present, then on a given record, either both must be populated or both must be null.
