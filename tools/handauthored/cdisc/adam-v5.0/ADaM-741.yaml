- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: PARAMN
define_element: ''
check:
  expand: ''
  all:
  - name: PARAM
    operator: is_not_unique_relationship
