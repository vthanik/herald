id: '390'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: BTOXGRH
define_element: ''
check:
  all:
  - name: BTOXGRHN
    operator: non_empty
  - name: BTOXGRH
    operator: empty
outcome:
  message: On a given record, BTOXGRHN is populated and BTOXGRH is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.7, Table 3.3.7.1: There must be a one-to-one relationship between ATOXGRHN and ATOXGRH within a parameter.
    ATOXGRHN cannot be present unless ATOXGRH is also present. When ATOXGRH and ATOXGRHN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
