id: '693'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: MEDICAL DEVICE BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: BASE
define_element: ''
check:
  operator: is_not_unique_relationship
  name: BASEC
  value:
    related_name: BASE
    group_by:
    - PARAMCD
    - USUBJID
    - SPDEVID
outcome:
  message: Within a given value of PARAMCD for a combination of device and subject,
    there is more than one value of BASE for a given value of BASEC, considering only
    those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0; ADaMIG v1.3 3.1.3; 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: "ADaMIG-MD v1.0, Section 3.1.3: MDBDS is one record per subject
    (optional), per device, per parameter (optional: per timepoint). \n\nADaMIG v1.3,
    Section 3.3.4.1, Table 3.3.4.1.1: Within a given parameter, if there exists a
    row on which both BASEC and BASE are populated, then there must be a one-to-one
    mapping between BASEC and BASE on all rows on which both variables are populated."
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
