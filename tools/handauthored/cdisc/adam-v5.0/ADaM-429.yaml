id: '429'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: APERIODC
define_element: ''
check:
  all:
  - name: APERIOD
    operator: non_empty
  - name: APERIODC
    operator: empty
outcome:
  message: On a given record, APERIOD is populated and APERIODC is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.3, Table 3.3.3.1: There must be a one-to-one relationship between APERIODC and APERIOD within a study.
    APERIODC cannot be present unless APERIOD is also present. When APERIOD and APERIODC are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
