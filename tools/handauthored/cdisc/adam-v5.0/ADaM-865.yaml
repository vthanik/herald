  cited_guidance: 'ADPPKIG v1.0, Section 3.3, Table 3.3: Numeric version of RACE eg.
    Codes used as per the specification. 1=American Indian OR Alaska Native, 2=Asian,
    3=Black/African American, 4=Native Hawaiian OR Other Pacific Islander, 5=White.
    If races need to be categorized differently, then use variables ARACE and ARACEN.'
