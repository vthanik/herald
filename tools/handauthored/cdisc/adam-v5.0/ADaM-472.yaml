id: '472'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: STRATwR where w is an integer [1-9, not zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: On rows where both STRATwR and STRATwRN are both populated.
outcome:
  message: There is more than one value of STRATwR for a given value of STRATwRN,
    considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.9: There must be a one-to-one relationship between STRATwRN and STRATwR within a study.
    STRATwRN cannot be present unless STRATwR is also present. When STRATwR and STRATwRN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: narrative

