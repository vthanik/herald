id: '448'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: DTHCAUSN
define_element: ''
check:
  all:
  - name: DTHCAUS
    operator: non_empty
  - name: DTHCAUSN
    operator: empty
outcome:
  message: On a given record, DTHCAUS is populated and DTHCAUSN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.8: There must be a one-to-one relationship between DTHCAUSN and DTHCAUS within a study.
    DTHCAUSN cannot be present unless DTHCAUS is also present. When DTHCAUS and DTHCAUSN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
