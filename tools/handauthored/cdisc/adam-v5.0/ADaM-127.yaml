id: '127'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.0'
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ABLFL
define_element: ''
check:
  operator: no_baseline_record
  name: BASE
  flag_var: ABLFL
  flag_value: 'Y'
  group_by:
  - PARAMCD
  - USUBJID
outcome:
  message: Within a given value of PARAMCD for a subject, BASE is populated and there
    is not at least one record with ABLFL equal to Y
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3.2.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3.2.4, Table 3.2.4.1: If BASE is populated
    for a parameter, and BASE is non-null for a subject for that parameter, then there
    must be a record flagged by ABLFL for that subject and parameter.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
