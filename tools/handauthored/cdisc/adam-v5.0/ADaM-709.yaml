severity: Medium
scope:
  classes: ALL
  domains: []
  exclude_domains: []
variable: ALL
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: Variable name matches a standard variable defined in the ADaM-IG
outcome:
  message: Labels for ADaM variables do not match the standard labels for ADaM variables
    listed in the implementation guide that cannot be modified (with the exception
    of (1) variables whose names contain indexes "w", “y”, or “zz”; and (2) variable
    labels with asterisks (*), braces ({...}), and ellipses (...) indicated for sponsor
    appropriate text)
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.1.6
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.1.6: In general, the variable labels specified
    in Section 3, Standard ADaM Variables, are required. There are only two exceptions
    to this rule: 1. Descriptive text is allowed at the end of the labels of variables
    whose names contain indexes "y" or "zz"; and 2. Variable labels containing a word
    or phrase in curly brackets, e.g., {Time} (the label for *TM variables), should
    be replaced by the producer with appropriate text. The label must contain the
    bracketed word or phrase somewhere in the text. For example, *STM must use the
    phrase "Start Time" in the label, so labels such as "Start Time of Rescue Med"
    or "Rescue Med Start Time" are both valid.'
  source_version: '1'
