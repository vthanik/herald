  cited_guidance: |-
    ADaMIG v1.1, Section 3.3.4, Table 3.3.4.1: If used for any PARAM within a dataset, should be non-null for all records of that dataset.

    ADaMIG v1.1, Section 4.2.1, Item 6: Whenever there is more than one definition of baseline, the BASETYPE column is required. BASETYPE identifies the definition of baseline that corresponds to the value of BASE in each row.
