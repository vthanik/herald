variable: ATOXDSCL
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: On rows where both ATOXDSCL and PARAM are both populated
outcome:
  message: Within a subject, there is more than one value of ATOXDSCL for a given
    value of PARAM, considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.7, Table 3.3.7.1: ATOXDCSL is only populated if AVAL is populated and the PARAM is evaluated for toxicity in the low direction. There is a one-to-one relationship between ATOXDCSL and PARAM within a subject.

    The ADaM Team acknowledges that this cited guidance contains a typographical error in the referenced variable name; however, we recognize the intent of the relationship between ATOXDSCL and PARAM and the one-to-one relationshup that they must have.
