id: '587'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: PBCHGCAy where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  operator: is_not_unique_relationship
  name: PBCHG
  value:
    related_name: PBCHGCAy
    group_by:
    - PARAMCD
  expand: 'y'
outcome:
  message: Within a given value of PARAMCD, there is more than one value of PBCHGCAy
    for a given value of PBCHG and y, where y is a single-digit integer [1-9]
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.4.1, Table 3.3.4.1.1: There must be a one-to-one relationship between PBCHGCyN and PBCHGCAy within a parameter.
    PBCHGCyN cannot be present unless PBCHGCAy is also present. When PBCHGCAy and PBCHGCyN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
