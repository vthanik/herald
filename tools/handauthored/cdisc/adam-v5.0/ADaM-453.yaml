id: '453'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: REGIONy where y is an integer [1-99, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: REGIONyN
    operator: non_empty
  - name: REGIONy
    operator: empty
outcome:
  message: On a given record, REGIONyN is populated and REGIONy is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.1: There must be a one-to-one relationship between REGIONyN and REGIONy within a study.
    REGIONyN cannot be present unless REGIONy is also present. When REGIONy and REGIONyN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
