provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.3.7, Table 3.3.7.1: There must be a one-to-one
    relationship between BTOXGRLN and BTOXGRL within a parameter.  BTOXGRLN cannot
    be present unless BTOXGRL is also present. When BTOXGRL and BTOXGRLN are present,
    then on a given record, either both must be populated or both must be null.'
