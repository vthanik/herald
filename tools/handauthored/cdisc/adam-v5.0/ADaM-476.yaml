- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: STRATAV
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: On rows where both STRATAV and STRATAVN are both populated.
outcome:
  message: There is more than one value of STRATAV for a given value of STRATAVN,
    considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.9: There must be a one-to-one relationship between STRATAVN and STRATAV within a study.
    STRATAVN cannot be present unless STRATAV is also present. When STRATAV and STRATAVN are present, then on a given record, either both must be populated or both must be null.
