- '1.3'
severity: Medium
scope:
  classes: ALL
  domains: []
  exclude_domains: []
variable: '*FN'
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: Variable with a suffix of FL is present and a variable with the
    same root and a suffix of FN is present
outcome:
  message: A variable with a suffix of FL is present and a variable with the same
    root and a suffix of FN has a value that is not  0, 1 or null
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.0, Section 3, Item 5 (General Flag Variable Conventions): For subject-level numeric population flag variables: 0 = no (not included), 1 = yes (included). Null values are not allowed.

    ADaMIG v1.0, Section 3, Item 9 (General Flag Variable Conventions): For character flags with variable names that end in FL and that are not population flags, a scheme of Y/N/null, or Y/null may be specified. As indicated in Table 3.3.4.2, and Table 3.3.8.1, some common character flags use the scheme Y/null. Corresponding 1/0/null and 1/null schemes apply to numeric flags with variable names that end in FN and that are not population indicators.
  source_version: '1'
