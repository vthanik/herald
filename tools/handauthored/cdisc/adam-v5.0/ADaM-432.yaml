id: '432'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: APHASE
define_element: ''
check:
  all:
  - name: APHASEN
    operator: non_empty
  - name: APHASE
    operator: empty
outcome:
  message: On a given record, APHASEN is populated and APHASE is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.3, Table 3.3.3.1: There must be a one-to-one relationship between APHASEN and APHASE within a study, which must be the same as the one-to-one mapping between w and APHASEw in ADSL.
    APHASEN cannot be present unless APHASE is also present. When APHASE and APHASEN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
