id: '178'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.0'
- '1.1'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ANLzzFL where zz is an integer [01-99, zero-padded]
define_element: ''
check:
  expand: zz
  all:
  - operator: non_empty
    name: ANLzzFL
  - operator: is_not_contained_by
    name: ANLzzFL
    value: 'Y'
outcome:
  message: ANLzzFL is not equal to Y or null where zz is a zero-padded two-digit integer
    [01-99]
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3.2.6
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3.2.6, Table 3.2.6.1: Codelist/Controlled
    Terms: Y {Y,NULL}'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
