id: '711'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: '*PFL'
define_element: ''
check:
  all:
  - operator: is_not_contained_by
    name: stemPFL
    value:
    - 'Y'
    - 'N'
outcome:
  message: A variable with a suffix of PFL has a value that is not Y, N, or null
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.1.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.1.4, Item 6: For parameter-level and record-level
    character population flag variables: N = no (not included), Y = yes (included).
    Null values are allowed.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
