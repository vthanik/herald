id: '393'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ATOXGRLN
define_element: ''
check:
  all:
  - name: ATOXGRL
    operator: non_empty
  - name: ATOXGRLN
    operator: empty
outcome:
  message: On a given record, ATOXGRL is populated and ATOXGRLN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.7, Table 3.3.7.1: There must be a one-to-one relationship between ATOXGRLN and ATOXGRL within a parameter.
    ATOXGRLN cannot be present unless ATOXGRL is also present. When ATOXGRL and ATOXGRLN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
