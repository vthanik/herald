id: '691'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: MEDICAL DEVICE BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ''
define_element: ''
check:
  operator: no_baseline_record
  name: BASE
  flag_var: ABLFL
  flag_value: 'Y'
  group_by:
  - PARAMCD
  - USUBJID
  - SPDEVID
outcome:
  message: Within a given value of PARAMCD for a combination of device and subject,
    BASE is populated and there is not at least one record with ABLFL equal to Y
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0; ADaMIG v1.3 3.1.3; 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: "ADaMIG-MD v1.0, Section 3.1.3: MDBDS is one record per subject
    (optional), per device, per parameter (optional: per timepoint). \n\nADaMIG v1.3,
    Section 3.3.4.1, Table 3.3.4.1.1: If BASE is populated for a parameter, and BASE
    is non-null for a combination of device and subject for that parameter, then there
    must be a record flagged by ABLFL for that subject and parameter."
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
