  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.2, Table 3.2.1: CDISC Notes for REGIONyN
    state: "One-to-one mapping to REGIONy within a study."'
