id: '356'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: REGIONyN where y is an integer [1-9, not zero-padded]
define_element: ''
check:
