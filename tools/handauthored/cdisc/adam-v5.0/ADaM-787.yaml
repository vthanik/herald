id: '787'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1000000000000001'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: SMQzzSC where zz is an integer [01-99, zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: On rows where both SMQzzSC and SMQzzSCN are both populated.
outcome:
  message: There is more than one value of SMQzzSC for a given value of SMQzzSCN,
    considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.1.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.1.1, Item 6: In a pair of corresponding
    variables (e.g., TRTP and TRTPN), the primary or most commonly used variable does
    not have the suffix or extension (e.g., N for Numeric or C for Character). The
    relevant suffix is used only on the name of the secondary member of the variable
    pair. For example, in the (TRTP, TRTPN) pair, the primary variable, TRTP is character;
    but it is not named TRTPC. Similarly in the (APERIOD, APERIODC) pair, the primary
    variable, APERIOD, is numeric; but it is not named APERIODN. When the secondary
    variable is numeric, it can only be included if the primary variable is also present
    in the dataset. If both variables of a variable pair are present, there must be
    a one-to-one mapping between the values of the two variables, as described in
    ADaMIG v1.1, Section 3.1.1, Item 5.'
  source_version: '1'
