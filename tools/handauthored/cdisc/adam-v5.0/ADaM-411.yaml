id: '411'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ANLzzFL where zz is an integer [01-99, zero-padded]
define_element: ''
check:
  expand: zz
  all:
  - name: ANLzzFN
    operator: non_empty
  - name: ANLzzFL
    operator: empty
outcome:
  message: On a given record, ANLzzFN is populated and ANLzzFL is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.8
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.8, Table 3.3.8.1: There must be a one-to-one relationship between ANLzzFN and ANLzzFL within a dataset.
    ANLzzFN cannot be present unless ANLzzFL is also present. When ANLzzFL and ANLzzFN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
