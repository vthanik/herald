id: '384'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: BTOXGRLN
define_element: ''
check:
  expand: ''
  all:
  - name: BTOXGRL
    operator: is_not_unique_relationship
    value:
      related_name: BTOXGRLN
      group_by: PARAMCD
outcome:
  message: Within a parameter, there is more than one value of BTOXGRLN for a given
    value of BTOXGRL, considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.3.7, Table 3.3.7.1: There must be a one-to-one
    relationship between BTOXGRLN and BTOXGRL within a parameter.  BTOXGRLN cannot
    be present unless BTOXGRL is also present. When BTOXGRL and BTOXGRLN are present,
    then on a given record, either both must be populated or both must be null.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
