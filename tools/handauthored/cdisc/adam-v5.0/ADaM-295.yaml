id: '295'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.0'
severity: Medium
scope:
  classes: OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ATOXGR
define_element: ''
check:
  all:
  - name: ATOXGRN
    operator: is_not_unique_relationship
    value:
      related_name: ATOXGR
outcome:
  message: There is more than one value of ATOXGR for a given value of ATOXGRN
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0; OCCDS v1.0; OCCDS v1.1 3; 3.2.8; 3.2.8
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.0, Section 3, Item 9 (General Variable Naming Conventions): In general, if SDTM character variables are converted to numeric variables in ADaM datasets, then they should be named as they are in the SDTM with an "N" suffix added. For example, the numeric version of the DM SEX variable is SEXN in an ADaM dataset, and a numeric version of RACE is RACEN. If necessary to keep within the 8-character variable name length limit, the last character may be removed prior to appending the N. Note that this naming scheme applies only to numeric variables whose values map one-to-one to the values of the equivalent character variables. Note also that this convention does not apply to date/time variables.

    OCCDS v1.0, Section 3.2.8, Table 3.2.8.1: CDISC Notes for ATOXGRN state: "Code ATOXGR to numeric".

    OCCDS v1.1, Section 3.2.8, Table 3.2.8.1: CDISC Notes for ATOXGRN state: "Code ATOXGR to numeric".
