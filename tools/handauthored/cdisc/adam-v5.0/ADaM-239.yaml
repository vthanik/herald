id: '239'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.0'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: TRTPGy where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: TRTPGy
    operator: exists
  - name: TRTA
    operator: exists
  - name: TRTAGy
    operator: not_exists
outcome:
  message: TRTPGy is present and TRTA is present but TRTAGy is not present, where
    y is a single-digit integer [1-9]
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3.3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3.3.2, Table 3.2.2.1: TRTAGy: Actual pooled
    treatment y. "y" represents an integer [1-9] corresponding to a particular pooling
    scheme. Required when TRTPGy is present and TRTA is present. May vary by record
    within a subject.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
