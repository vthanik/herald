id: '511'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: High
scope:
  classes: ALL
  domains: []
  exclude_domains: []
variable: '*SDTM'
define_element: ''
check:
  operator: label_by_suffix_missing
  suffix: SDTM
  value: Start Datetime
outcome:
  message: A variable ending in SDTM must contain "Start Datetime" in the label
  severity: High
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.1.6
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.1.6, Item 2: Variable labels containing
    a word or phrase in brackets, e.g. {Time}, should be replaced by the producer
    with appropriate text that contains the bracketed word or phrase somewhere in
    the text (e.g., the label for a *TM variable is indicated as {Time} in this document)
    indicating any producer defined label is permitted as long as the word Time is
    incorporated in it.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
