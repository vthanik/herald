id: '697'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: MEDICAL DEVICE BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ABLFL
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: USUBJID and SPDEVID are present, BASETYPE is not present, and
    PARAMCD is populated
outcome:
  message: Within a given PARAMCD for a combination of device and subject, more than
    one record has ABLFL equal to Y and BASETYPE is not present
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0; ADaMIG v1.3 3.1.3; 3.3.8
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: "ADaMIG-MD v1.0, Section 3.1.3: MDBDS is one record per subject
    (optional), per device, per parameter (optional: per timepoint). \n\nADaMIG v1.3,
    Section 3.3.8, Table 3.3.8.1: Character indicator to identify the baseline record
    for each subject, parameter, and baseline type (BASETYPE) combination. See BASETYPE
    in Table 3.3.4.1.1. ABLFL is required if BASE is present in the dataset.  A baseline
    record may be derived (e.g., it may be an average), in which case DTYPE must also
    be populated. If BASE is populated for a parameter, and BASE is non-null for a
    subject for that parameter, then there must be a record flagged by ABLFL for that
    subject and parameter."
  source_version: '1'
  license: CC-BY-4.0
  executability: narrative

