id: '892'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.0'
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - NON-COMPARTMENTAL ANALYSIS
  domains: []
  exclude_domains: []
variable: COHORT
define_element: ''
check:
  expand: ''
  all:
  - name: COHORTN
    operator: is_not_unique_relationship
    value:
      related_name: COHORT
outcome:
  message: On a given record, there is more than one value of COHORT for a given value
    of COHORTN
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADNCA v1.0 4.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADNCA IG v1.0, Section 4.2, Table 4.2.1: There must be a one-to-one
    mapping between COHORT and COHORTN.  When COHORT and COHORTN are present, then
    on a given record, either both must be populated or both must be null.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
