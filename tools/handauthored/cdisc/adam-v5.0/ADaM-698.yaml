id: '698'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: MEDICAL DEVICE BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: BASE
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: USUBJID and SPDEVID are present, BASETYPE is not present, and
    PARAMCD and BASE are populated
outcome:
  message: BASETYPE is not present, BASE is populated, and BASE is not equal to AVAL
    where ABLFL is equal to Y for a given value of PARAMCD for a combination of device
    and subject
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0; ADaMIG v1.3 3.1.3; 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: "ADaMIG-MD v1.0, Section 3.1.3: MDBDS is one record per subject
    (optional), per device, per parameter (optional: per timepoint). \n\nADaMIG v1.3,
    Section 3.3.4.1, Table 3.3.4.1.1: BASE contains the value of AVAL copied from
    a record within the parameter on which ABLFL = \"Y\"."
  source_version: '1'
  license: CC-BY-4.0
  executability: narrative

