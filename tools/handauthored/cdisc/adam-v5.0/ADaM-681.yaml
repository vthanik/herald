id: '681'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: DEVICE LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: MODELGy where y is an integer [1-99, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: MODELGyN
    operator: is_not_unique_relationship
    value:
      related_name: MODELGy
outcome:
  message: There is more than one value of MODELGy for a given value of MODELGyN,
    considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0 3.2.1.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG-MD v1.0, Section 3.2.1.2: Numeric representation of grouping
    "y" of the pooled device type group.  There must be a one-to-one relationship
    between MODELGyN and MODELGy within a study. '
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
