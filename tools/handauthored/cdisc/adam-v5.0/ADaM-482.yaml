id: '482'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: BCHGCAyN where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: BCHGCATy is populated
outcome:
  message: On a given record, BCHGCATy is populated and BCHGCAyN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.4.1, Table 3.3.4.1.1: There must be a one-to-one relationship between BCHGCAyN and BCHGCATy within a parameter.
    BCHGCAyN cannot be present unless BCHGCATy is also present. When BCHGCATy and BCHGCAyN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
