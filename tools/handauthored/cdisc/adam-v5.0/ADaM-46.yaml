  condition_failure: Variable with a suffix of DY
outcome:
  message: A variable with a suffix of DY has a value of zero
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3, Item 8 (General Timing Variable Conventions):
    Variables whose names end in DY are relative day variables. In ADaM as in the
    SDTM, there is no day 0. If there is a need to create a relative day variable
    that includes day 0, then its name must not end in DY. ADaM relative day variables
    need not be anchored by SDTM RFSTDTC. When SDTM.RFSTDTC is not the anchor date
    then the anchor date used must be stored in an ADaM dataset.'
