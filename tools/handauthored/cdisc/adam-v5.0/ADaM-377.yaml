id: '377'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: TRTxxPN where xx is an integer [01-99, zero-padded]
define_element: ''
check:
  expand: xx
  all:
  - name: TRTxxP
    operator: non_empty
  - name: TRTxxPN
    operator: empty
outcome:
  message: On a given record, TRTxxP is populated and TRTxxPN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.2, Table 3.2.4: There must be a one-to-one
    relationship between TRTxxPN and TRTxxP within a study.  TRTxxPN cannot be present
    unless TRTxxP is also present. When TRTxxP and TRTxxPN are present, then on a
    given record, either both must be populated or both must be null.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
