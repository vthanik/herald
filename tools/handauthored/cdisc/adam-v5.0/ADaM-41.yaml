  cited_guidance: |-
    ADaMIG v1.0, Section 3, Item 1 (General Timing Variable Conventions): Numeric dates, times and datetimes should be formatted, so as to be human readable with no loss of precision. The anchor or reference day that all other dates are numbered from should be clearly identified in the metadata.

    ADaMIG v1.0, Section 3, Item 2 (General Timing Variable Conventions): Variables whose names end in DT are numeric dates.
