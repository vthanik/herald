id: '679'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: DEVICE LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: DEVTYGyN where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: DEVTYGy
    operator: non_empty
  - name: DEVTYGyN
    operator: empty
outcome:
  message: 'On a given record, DEVTYGy is populated and DEVTYGyN is not populated '
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0 3.2.1.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG-MD v1.0, Section 3.2.1.2: DEVTYGyN cannot be present unless DEVTYGy
    is also present. When DEVTYGy and DEVTYGyN are present, then on a given record,
    either both must be populated or both must be null.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
