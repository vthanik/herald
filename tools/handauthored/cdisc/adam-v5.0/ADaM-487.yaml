id: '487'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: CRITyFL where y is an integer [1-99, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: CRITyFN
    operator: non_empty
  - name: CRITyFL
    operator: empty
outcome:
  message: On a given record, CRITyFN is populated and CRITyFL is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.4.3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.4.3, Table 3.3.4.3.1: There must be a one-to-one relationship between CRITyFN and CRITyFL within a parameter.
    CRITyFN cannot be present unless CRITyFL is also present. When CRITyFL and CRITyFN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
