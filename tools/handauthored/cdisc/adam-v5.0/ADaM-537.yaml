id: '537'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: TOXGGRyN where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: TOXGGRyN
    operator: exists
  - name: TOXGGRy
    operator: not_exists
outcome:
  message: TOXGGRyN is present and TOXGGRy is not present
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.1.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.1.1, Item 6: When the secondary variable
    is numeric, it can only be included if the primary variable is also present in
    the dataset.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
