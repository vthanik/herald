variable: '*DTF'
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: Variable with a suffix of DTF is present
outcome:
  message: A variable with a suffix of DTF has a value that is not within Controlled
    Terminology for DATEFL
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3, Item 6 (General Timing Variable Conventions):
    Variables whose names end in DTF are date imputation flags. *DTF variables represent
    the level of imputation of the *DT variable based on the source SDTM DTC variable.
    *DTF = Y if the entire date is imputed. *DTF = M if month and day are imputed.
    *DTF = D if only day is imputed. *DTF = null if *DT equals the SDTM DTC variable
    date part equivalent. If a date was imputed, *DTF must be populated and is required.
    Both *DTF and *TMF may be needed to describe the level of imputation in *DTM if
    imputation was done.'
  source_version: '1'
