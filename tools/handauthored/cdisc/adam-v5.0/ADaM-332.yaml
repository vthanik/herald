id: '332'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: CHGCATyN where y is an integer [1-9, not zero-padded]
define_element: ''
check:
  expand: 'y'
  all:
  - name: CHGCATy
    operator: is_not_unique_relationship
    value:
      related_name: CHGCATyN
      group_by: PARAMCD
outcome:
  message: Within a parameter, there is more than one value of CHGCATyN for a given
    value of CHGCATy, considering only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.3.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.3.4, Table 3.3.4.1: CDISC Notes for CHGCATyN
    state: "There must be a one-to-one relationship within a parameter between CHGCATy
    and CHGCATyN."'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
