  condition_failure: Considering only those rows on which both *GRy and *GRyN are
    populated
outcome:
  message: There is more than one value of a variable which has a suffix of GRy for
    a given value of a variable with the same root name and suffix of GRyN, considering
    only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.1.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.1, Section 3.1.1, Item 5: For variable pairs designated as having a one-to-one mapping within a specified scope (e.g., within a parameter, within a study), if both variables are present in the dataset and there exists a row in that scope on which both variables are populated, then there must be a one-to-one mapping between the two variables on all rows within the scope on which both variables are populated. The scopes noted in this document should be considered the minimum level for the mapping; it does not preclude the producer from using a broader level of scope. For example, if a one-to-one mapping is specified as within a PARAM, the producer may elect to use the same one-to-one mapping across all PARAMs within the dataset or study. In addition, note that "within a parameter" means "within a parameter within a dataset.".

    ADaMIG v1.1, Section 3.1.1, Item 6: In a pair of corresponding variables (e.g., TRTP and TRTPN), the primary or most commonly used variable does not have the suffix or extension (e.g., N for Numeric or C for Character). The relevant suffix is used only on the name of the secondary member of the variable pair. For example, in the (TRTP, TRTPN) pair, the primary variable, TRTP is character; but it is not named TRTPC. Similarly in the (APERIOD, APERIODC) pair, the primary variable, APERIOD, is numeric; but it is not named APERIODN. When the secondary variable is numeric, it can only be included if the primary variable is also present in the dataset. If both variables of a variable pair are present, there must be a one-to-one mapping between the values of the two variables, as described in ADaMIG v1.1, Section 3.1.1, Item 5.
