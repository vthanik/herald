id: '32'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.0'
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: ENRLFN
define_element: ''
check:
  all:
  - operator: non_empty
    name: ENRLFN
  - operator: is_not_contained_by
    name: ENRLFN
    value:
    - '1'
    - '0'
outcome:
  message: ENRLFN is present and has a value that is not 1 or 0
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.0, Section 3.1, Table 3.1.1: The values of subject-level
    population flags cannot be blank. If a flag is used, the corresponding numeric
    version (*FN) can also be included.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
