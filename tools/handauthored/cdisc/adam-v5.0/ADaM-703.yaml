id: '703'
authority: CDISC
standard: ADaM-IG
standard_versions: '1.3'
severity: Medium
scope:
  classes: MEDICAL DEVICE BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ByIND where y is an integer [1-99, not zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: USUBJID and SPDEVID are present, BASETYPE is not present, and
    ByIND is populated
outcome:
  message: BASETYPE is not present, ByIND is populated, and ByIND is not equal to
    AyIND where ABLFL is equal to Y for a given value of PARAMCD for a combination
    of device and subject
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG-MD v1.0; ADaMIG v1.3 3.1.3; 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: "ADaMIG-MD v1.0, Section 3.1.3: MDBDS is one record per subject
    (optional), per device, per parameter (optional: per timepoint). \n\nADaMIG v1.3,
    Section 3.3.7, Table 3.3.7.1: CDISC Notes for ByIND state: \"AyIND of the baseline
    record identified by ABLFL.\""
