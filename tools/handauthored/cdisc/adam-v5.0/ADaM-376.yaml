id: '376'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: ALL
  domains: []
  exclude_domains: []
variable: '*GRyN where y is an integer [1-99, not zero-padded]'
define_element: ''
check:
  expand: stem,y
  all:
  - name: stemGRy
    operator: non_empty
  - name: stemGRyN
    operator: empty
outcome:
  message: On a given record, a variable which has a suffix of GRy is populated and
    a variable with the same root name and suffix of GRyN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.1.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.1.1, Item 5: For variable pairs designated as having a one-to-one relationship within a specified scope (e.g., within a parameter, within a study), if both variables are present in the dataset and there exists a row in that scope on which both variables are populated, then there must be a one-to-one relationship between the two variables on all rows within the scope on which both variables are populated. The scope noted in this document should be considered the minimum level for the mapping; it does not preclude the producer from using a broader level of scope. For example, if a one-to-one relationship is specified as within a PARAM, the producer may elect to use the same one-to-one relationship across all PARAMs within the dataset or study. In addition, note that "within a parameter" means "within a parameter within a dataset."

    ADaMIG v1.2, Section 3.1.1, Item 6: In a pair of corresponding variables (e.g., TRTP and TRTPN), the primary or most commonly used variable does not have the suffix or extension (i.e., N for numeric or C for character). The relevant suffix is used only on the name of the secondary member of the variable pair. For example, in the (TRTP, TRTPN) pair, the primary variable, TRTP, is character, but it is not named TRTPC. Similarly in the (APERIOD, APERIODC) pair, the primary variable, APERIOD, is numeric, but it is not named APERIODN. When a secondary variable is included in the dataset, then the primary variable must also be included. If both variables of a variable pair are present, there must be a one-to-one relationship between the values of the two variables, as described in Item 5 above.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
