outcome:
  message: The length of a character value is greater than 200 characters
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: Model v2.1; ADaMIG v1.0 4.1.2; 3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    Model v2.1, Section 4.1.2: In developing naming conventions, sponsors should consider the requirements noted in the eCTD guidance document as well as the need to conform to the SAS Transport format requirements (e.g., the total length of the name cannot exceed 8 characters).

    ADaMIG v1.0, Section 3, Item 5 (General Variable Naming Conventions): To ensure compliance with SAS Transport file and Oracle constraints, all ADaM variable names must be no more than 8 characters in length, start with a letter (not underscore), and be comprised only of letters (A-Z), underscore (_), and numerals (0-9). All ADaM variable labels must be no more than 40 characters in length. All ADaM character variables must be no more than 200 characters in length.
