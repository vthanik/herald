id: '11'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.0'
- '1.1'
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: ALL
  domains: []
  exclude_domains: []
variable: '*FN'
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: Variable with a suffix of FL is present and equal to N, and a
    variable with the same root and a suffix of FN is present
outcome:
  message: A variable with a suffix of FL is equal to N and a variable with the same
    root and a suffix of FN is not equal to 0
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0 3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.0, Section 3, Item 4 (General Flag Variable Conventions): For subject-level character population flag variables: N = no (not included in the population), Y = yes (included). Null values are not allowed.

    ADaMIG v1.0, Section 3, Item 9 (General Flag Variable Conventions): For character flags that are not population flags, a scheme of Y/N/null, or Y/null may be specified. As indicated in Table 3.2.6.1, some common character flags use the scheme Y/null. Corresponding 1/0/null and 1/null schemes apply to numeric flags that are not population indicators.
  source_version: '1'
