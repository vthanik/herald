id: '713'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: '*PFN'
define_element: ''
check:
  all:
  - operator: is_not_contained_by
    name: stemPFN
    value:
    - '1'
    - '0'
outcome:
  message: A variable with a suffix of PFN has a value that is not 1, 0, or null
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.1.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.1.4, Item 7: For parameter-level and record-level
    numeric population flag variables, 0 = no (not included), 1 = yes (included).
    Null values are allowed.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
