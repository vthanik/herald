id: '419'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: SUBJECT LEVEL ANALYSIS DATASET
  domains: []
  exclude_domains: []
variable: TRxxPGy where xx is an integer [01-99, zero-padded] and y is an integer
  [1-99, not zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: TRxxPGyN is populated
outcome:
  message: On a given record, TRxxPGyN is populated and TRxxPGy is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.4: There must be a one-to-one relationship between TRxxPGyN and TRxxPGy within a study.
    TRxxPGyN cannot be present unless TRxxPGy is also present. When TRxxPGy and TRxxPGyN are present, then on a given record, either both must be populated or both must be null.
