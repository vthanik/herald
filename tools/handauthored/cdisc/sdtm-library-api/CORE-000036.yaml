Authorities:
- Organization: CDISC
  Standards:
  - Name: SDTMIG
    References:
    - Citations:
      - Cited_Guidance: Value is "Y" for planned visits, null for unplanned visits.
        Document: SDTMIG v3.4
        Item: SVPRESP
        Section: '5.5'
      - Cited_Guidance: The values of VISITNUM in the TV dataset are the valid values
          of VISITNUM for planned Visits.  Any values of VISITNUM that appear in subject-level
          datasets that are not in the TV dataset are assumed to correspond to unplanned
          Visits....  If a subject-level dataset includes both VISITNUM and VISIT,
          then records that include values of VISITNUM that appear in the TV dataset
          should also include the corresponding values of VISIT from the TV dataset.
        Document: SDTMIG v3.4
        Item: Assumption 6
        Section: 7.3.1
      Origin: SDTM and SDTMIG Conformance Rules
      Rule_Identifier:
        Id: CG0657
        Version: '1'
      Version: '2.0'
    Version: '3.4'
  - Name: TIG
    References:
    - Citations:
      - Cited_Guidance: 2.8.10.25 [Specification][SVPRESP] [Value is "Y" for planned
          visits, null for unplanned visits.]|Section 10.8.33[Assumption 6] [The values
          of VISITNUM in the TV dataset are the valid values of VISITNUM for planned
          Visits. Any values of VISITNUM that appear in subject-level datasets that
          are not in the TV dataset are assumed to correspond to unplanned Visits.  If
          a subject-level dataset includes both VISITNUM and VISIT, then records that
          include values of VISITNUM that appear in the TV dataset should also include
          the corresponding values of VISIT from the TV dataset.]
        Document: TIG 1.0
