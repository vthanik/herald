Check:
  all:
  - name: SVPRESP
    operator: equal_to
    value: 'Y'
  - name: VISIT
    operator: is_not_contained_by
    value: $tv_visit
Core:
  Id: CORE-000036
  Status: Published
  Version: '1'
Description: Raise an error when SVPRESP is "Y" and VISIT is not present in TV.VISIT.
Executability: Fully Executable
Operations:
- domain: TV
  id: $tv_visit
  name: VISIT
  operator: distinct
Outcome:
  Message: Planned visit is not found in TV.
Rule_Type: Record Data
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SV
  Use_Case: INDH
Sensitivity: Record
