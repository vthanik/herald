id: define_predecessor_origin_source_empty
version: 1
standard: Define-XML
description: |
  When a Variables-sheet row has Origin='Predecessor', the Source column must be null. Source is mandated only when Origin is not Predecessor (see HRL-DD-056); populating it alongside a Predecessor origin indicates inconsistent metadata. Counterpart to HRL-DD-061 (which covers the Predecessor-field-present requirement).
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: not_equal_to
    value: Predecessor
  - name: source
    operator: empty
outcome:
  message: DEFINE_PREDECESSOR_ORIGIN_SOURCE_EMPTY
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1
    § 4.3.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml
  executability: predicate
  license: MIT
