id: HRL-DD-064
version: 2
standard: Define-XML
description: |
  Where Clause is required for all value-level metadata entries.
scope:
  classes: []
  domains: []
check:
  all:
  - name: where_clause
    operator: non_empty
outcome:
  message: Where Clause is missing. Each value-level metadata entry must have a Where
    Clause defining when the value applies.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.10
  cited_guidance: |
    Each Value definition may have a Where Clause attached to describe when that Value applies.
  executability: predicate
  license: MIT
