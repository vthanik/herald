id: HRL-DD-079
version: 2
standard: Define-XML
description: |
  Method ID is required and must be unique.
scope:
  classes: []
  domains: []
check:
  all:
  - name: method_id
    operator: non_empty
outcome:
  message: Method ID is missing. Each method must have a unique ID.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.14
  cited_guidance: |
    OID -- Required. Unique ID for the MethodDef.
  executability: predicate
  license: MIT
