id: HRL-DD-043
version: 2
standard: Define-XML
description: |
  Purpose must be 'Tabulation' for SDTM/SEND or 'Analysis' for ADaM.
scope:
  classes: []
  domains: []
check:
  all:
  - name: purpose
    operator: empty
  - name: purpose
    operator: in
    value:
    - Tabulation
    - Analysis
outcome:
  message: Purpose has an invalid value. Must be 'Tabulation' (SDTM/SEND) or 'Analysis'
    (ADaM).
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.11
  cited_guidance: |
    Purpose -- Required. 'Tabulation', 'Analysis'. For SDTM and SEND, use Tabulation. For ADaM, use Analysis.
  executability: predicate
  license: MIT
