id: HRL-DD-065
version: 2
standard: Define-XML
description: |
  Where Clause comparators must be valid (LT, LE, GT, GE, EQ, NE, IN, NOTIN).
scope:
  classes: []
  domains: []
check:
  all:
  - name: where_comparator
    operator: empty
  - name: where_comparator
    operator: in
    value:
    - LT
    - LE
    - GT
    - GE
    - EQ
    - NE
    - IN
    - NOTIN
outcome:
  message: 'Where Clause comparator is not valid. Allowable values: LT, LE, GT, GE,
    EQ, NE, IN, NOTIN.'
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.10.1
  cited_guidance: |
    Comparator -- Required. 'LT','LE','GT','GE','EQ','NE','IN','NOTIN'.
  executability: predicate
  license: MIT
