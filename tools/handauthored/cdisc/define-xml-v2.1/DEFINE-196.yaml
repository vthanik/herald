id: DEFINE-196
authority: CDISC
standard: Define-XML
standard_versions:
- '2.0'
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
check:
  narrative: Attribute OrderNumber must be provided for the CodeListItem element when
    there is at least one OrderNumber attribute value provided for the same CodeList.
outcome:
  message: Attribute OrderNumber is missing for element CodeListItem[@CodedValue]
    in CodeList[@Name] which has attribute OrderNumber provided for another CodeListItem.
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
  define_rule_id: 196
  license: CC-BY-4.0
  applicable_versions: Both 2.0 and 2.1
  source_type: Specification
  xpaths: /ODM/Study/MetaDataVersion/CodeList/CodeListItem
  element: CodeListItem
  attribute: OrderNumber
