check:
  narrative: Attribute def:IsNonStandard must be provided for a CodeList element where
    CDISC Controlled Terminology is required and there is no Alias provided.
outcome:
  message: Attribute def:IsNonStandard is missing and Alias[@Context="nci:ExtCodeID"]
    is not provided for a variable with required controlled terminology.
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
  define_rule_id: 153
  license: CC-BY-4.0
  applicable_versions: 2.1 only
  source_type: Specification
  xpaths: /ODM/Study/MetaDataVersion/CodeList
  element: CodeList
  attribute: def:IsNonStandard
