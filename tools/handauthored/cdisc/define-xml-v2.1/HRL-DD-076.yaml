id: HRL-DD-076
version: 1
standard: Define-XML
description: |
  NCI Term Code is required for each term in a CDISC CT codelist.
scope:
  classes: []
  domains: []
check:
  all:
  - name: terminology
    operator: empty
  - name: nci_term_code
    operator: non_empty
outcome:
  message: NCI Term Code is missing for a term in a CDISC CT codelist. Alias with
    C-Code is required for each term in CDISC CT.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 4.9; 5.3.11.1
  cited_guidance: |
    Each EnumeratedItem or CodeListItem element that represents a defined term in CDISC Controlled Terminology also requires an Alias element.
  executability: predicate
  license: MIT
