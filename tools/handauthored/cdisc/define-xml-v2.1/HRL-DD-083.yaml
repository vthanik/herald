id: HRL-DD-083
version: 2
standard: Define-XML
description: |
  Comment ID is required and must be unique.
scope:
  classes: []
  domains: []
check:
  all:
  - name: comment_id
    operator: non_empty
outcome:
  message: Comment ID is missing. Each comment must have a unique ID.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.15
  cited_guidance: |
    OID -- Required. Unique ID for the CommentDef.
  executability: predicate
  license: MIT
