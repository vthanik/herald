id: HRL-DD-071
version: 2
standard: Define-XML
description: |
  Codelist ID is required for each codelist entry.
scope:
  classes: []
  domains: []
check:
  all:
  - name: codelist_id
    operator: non_empty
outcome:
  message: Codelist ID is missing. Each codelist entry must have an ID.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.13
  cited_guidance: |
    OID -- Required. Unique ID for the CodeList.
  executability: predicate
