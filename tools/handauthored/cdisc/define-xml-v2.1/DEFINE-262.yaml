check:
  narrative: Value of the ParentClass attribute in the def:Class must be one of the
    values from the CDISC/NCI Class or Subclass codelists.
outcome:
  message: The value of SubClass ParentClass [@ParentClass] for dataset [$ParentItemGroupDef/@Name]
    is not in the CDISC/NCI class or subclass codelists.
  severity: Medium
