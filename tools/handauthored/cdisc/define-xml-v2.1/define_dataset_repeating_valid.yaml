id: define_dataset_repeating_valid
version: 2
standard: Define-XML
description: |
  Repeating must be 'Yes' or 'No'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: repeating
    operator: empty
  - name: repeating
    operator: in
    value:
    - 'Yes'
    - 'No'
outcome:
  message: DEFINE_DATASET_REPEATING_VALID
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.11
  cited_guidance: |
    Repeating -- Required. 'Yes', 'No'.
  executability: predicate
  license: MIT
