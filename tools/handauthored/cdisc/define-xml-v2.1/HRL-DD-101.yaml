id: HRL-DD-101
version: 1
standard: Define-XML
description: |
  ARM AnalysisVariable must be unique within an AnalysisResult.
scope:
  classes: []
  domains: []
check:
  all:
  - name: variables
    operator: empty
  - name: __arm_variables_unique
    operator: equal_to
    value: yes
outcome:
  message: AnalysisVariable is not unique within the AnalysisResult. Each variable
    should appear only once per result.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: ARM 1.0
  cited_guidance: |
    P21 DD0091: The armAnalysisVariable in the Analysis Results Metadata must be unique within an ARM.
  executability: predicate
  license: MIT
