id: HRL-DD-086
version: 1
standard: Define-XML
description: |
  Document ID referenced by a method or comment must exist in the Documents sheet.
scope:
  classes: []
  domains: []
check:
  all:
  - name: document_id
    operator: empty
  - name: __document_exists
    operator: equal_to
    value: yes
outcome:
  message: Document ID referenced does not exist in the Documents sheet.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.16
  cited_guidance: |
    leafID -- Required. Reference to the unique ID of the def:leaf element that contains the location of a file.
  executability: predicate
  license: MIT
