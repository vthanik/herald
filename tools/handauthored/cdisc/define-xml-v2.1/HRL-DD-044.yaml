id: HRL-DD-044
version: 2
standard: Define-XML
description: |
  Variable name is required in the Variables sheet.
scope:
  classes: []
  domains: []
check:
  all:
  - name: variable
    operator: non_empty
outcome:
  message: Variable name is missing. Each row in the Variables sheet must have a variable
    name.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.12
  cited_guidance: |
    Name -- Required. Dataset Variable name or Variable Value Name.
  executability: predicate
  license: MIT
