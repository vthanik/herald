id: HRL-DD-028
version: 2
standard: Define-XML
description: |
  def:Context must be 'Submission' or 'Other' when specified.
scope:
  classes: []
  domains: []
check:
  all:
  - name: Context
    operator: empty
  - name: Context
    operator: in
    value:
    - Submission
    - Other
outcome:
  message: def:Context has an invalid value. Must be 'Submission' or 'Other'.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.3
  cited_guidance: |
    def:Context -- Required. Allowable Values: 'Submission', 'Other'.
  executability: predicate
  license: MIT
