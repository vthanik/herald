id: HRL-DD-073
version: 2
standard: Define-XML
description: |
  Codelist Data Type must be 'text', 'integer', or 'float'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: data_type
    operator: empty
  - name: data_type
    operator: in
    value:
    - text
    - integer
    - float
outcome:
  message: Codelist Data Type is not valid. Must be 'text', 'integer', or 'float'.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.13
  cited_guidance: |
    DataType -- Required. 'text', 'float', 'Integer'. The data type of the codes.
  executability: predicate
  license: MIT
