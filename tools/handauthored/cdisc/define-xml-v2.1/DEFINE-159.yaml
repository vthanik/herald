id: DEFINE-159
authority: CDISC
standard: Define-XML
standard_versions:
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
check:
  narrative: ItemDef which has a def:Origin element with Type = 'Collected' must have
    a reference to a document which corresponds to AnnotatedCRF
outcome:
  message: ItemDef[@Name] with def:Origin/@Type = 'Collected' and def:Origin/@Source
    = [@Source] does not have to an annotated CRF document.
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
  define_rule_id: 159
  license: CC-BY-4.0
  applicable_versions: 2.1 only
  source_type: Specification
  xpaths: /ODM/Study/MetaDataVersion/ItemDef/def:Origin
  element: def:Origin
  attribute: Type
