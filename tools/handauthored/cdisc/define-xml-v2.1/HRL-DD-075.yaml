id: HRL-DD-075
version: 1
standard: Define-XML
description: |
  NCI Codelist Code is required for codelists representing CDISC Controlled Terminology.
scope:
  classes: []
  domains: []
check:
  all:
  - name: terminology
    operator: empty
  - name: nci_code
    operator: non_empty
outcome:
  message: NCI Codelist Code is missing for a CDISC CT codelist. Alias with C-Code
    is required for CodeList elements representing CDISC CT.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 4.9; 5.3.11.1
  cited_guidance: |
    When used for regulatory submission, the Alias element is required for each CodeList that represents CDISC Controlled Terminology.
  executability: predicate
  license: MIT
