id: HRL-DD-072
version: 1
standard: Define-XML
description: |
  Codelist Name must be unique within the specification.
scope:
  classes: []
  domains: []
check:
  all:
  - name: name
    operator: is_unique_set
outcome:
  message: Codelist Name is not unique. The Name must be unique within the set of
    CodeList elements.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.13
  cited_guidance: |
    Business Rule: The Name must be unique within the set of Codelist elements.
  executability: predicate
  license: MIT
