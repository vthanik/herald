check:
  narrative: Codelist SASFormatName attribute must contain a valid SAS format name.
    It needs to start with a $ character in case the CodeList DataType is text.
outcome:
  message: ItemDef[@Name] has an invalid SASFormatName attribute value [@SASFormatName].
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
