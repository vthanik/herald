id: HRL-DD-081
version: 2
standard: Define-XML
description: |
  Method Description is required.
scope:
  classes: []
  domains: []
check:
  all:
  - name: description
    operator: non_empty
outcome:
  message: Method Description is missing. MethodDef must contain a Description element.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.14
  cited_guidance: |
    Business Rule: Must contain the child Description element.
  executability: predicate
  license: MIT
