id: HRL-DD-099
version: 1
standard: Define-XML
description: |
  Document defined in Documents sheet but never referenced by any Method or Comment.
scope:
  classes: []
  domains: []
check:
  all:
  - name: __document_is_referenced
    operator: equal_to
    value: no
outcome:
  message: Document is defined but never referenced by any method or comment. Consider
    removing orphaned documents.
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: '3.5'
  cited_guidance: |
    def:leaf elements provide the information needed to locate an external document file referenced in the Define-XML.
  executability: predicate
  license: MIT
