id: define_variable_mandatory_valid
version: 2
standard: Define-XML
description: |
  Mandatory must be 'Yes' or 'No'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: mandatory
    operator: empty
  - name: mandatory
    operator: in
    value:
    - 'Yes'
    - 'No'
outcome:
  message: DEFINE_VARIABLE_MANDATORY_VALID
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.9.2
  cited_guidance: |
    Mandatory -- Required. 'Yes', 'No'.
  executability: predicate
  license: MIT
