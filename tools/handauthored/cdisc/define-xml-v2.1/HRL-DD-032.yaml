id: HRL-DD-032
version: 2
standard: Define-XML
description: |
  Class name must be a valid CDISC Controlled Terminology value for General Observation Class.
scope:
  classes: []
  domains: []
check:
  all:
  - name: class
    operator: empty
  - name: class
    operator: in
    value:
    - SPECIAL PURPOSE
    - INTERVENTIONS
    - EVENTS
    - FINDINGS
    - FINDINGS ABOUT
    - RELATIONSHIP
    - STUDY REFERENCE
    - TRIAL DESIGN
    - ASSOCIATED PERSONS
    - SUBJECT LEVEL ANALYSIS DATASET
    - BASIC DATA STRUCTURE
    - OCCURRENCE DATA STRUCTURE
    - ADAM OTHER
    - INTEGRATED SUBJECT LEVEL
    - DEVICE
outcome:
  message: Class value is not a valid CDISC General Observation Class. Class is case-sensitive
    and controlled by a non-extensible codelist.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.11.2
  cited_guidance: |
    Name -- Required. Text must follow CDISC Controlled Terminology for General Observation Class.
  executability: predicate
  license: MIT
