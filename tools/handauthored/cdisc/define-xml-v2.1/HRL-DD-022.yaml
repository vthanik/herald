id: HRL-DD-022
version: 1
standard: Define-XML
description: |
  When a Variables-sheet row has Origin='Assigned', the Predecessor column must be null. Assigned values come from a fixed sponsor assignment (e.g. DOMAIN, STUDYID, study-level constants), not from a source-record predecessor.
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: not_equal_to
    value: Assigned
  - name: predecessor
    operator: empty
outcome:
  message: Origin='Assigned' but Predecessor is populated. Assigned values have no
    predecessor record.
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1
    § 4.3.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml
  executability: predicate
  license: MIT
