id: define_predecessor_origin_method_empty
version: 1
standard: Define-XML
description: |
  When a Variables-sheet row has Origin='Predecessor', the Method column must be null. Predecessor origins inherit from another dataset and should not carry a derivation method. Counterpart to HRL-DD-059 (which requires Method when Origin='Derived').
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: not_equal_to
    value: Predecessor
  - name: method_id
    operator: empty
outcome:
  message: DEFINE_PREDECESSOR_ORIGIN_METHOD_EMPTY
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1
    § 5.3.9.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml
  executability: predicate
  license: MIT
