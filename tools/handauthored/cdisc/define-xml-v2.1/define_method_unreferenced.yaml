id: define_method_unreferenced
version: 1
standard: Define-XML
description: |
  Method defined in Methods sheet but never referenced by any Variable or ValueLevel entry.
scope:
  classes: []
  domains: []
check:
  all:
  - name: __method_is_referenced
    operator: equal_to
    value: no
outcome:
  message: DEFINE_METHOD_UNREFERENCED
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: '3.5'
  cited_guidance: |
    Each distinct method is expected to have a unique MethodOID and can be referenced from different variables.
  executability: predicate
  license: MIT
