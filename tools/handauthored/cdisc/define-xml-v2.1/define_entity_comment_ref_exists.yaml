id: define_entity_comment_ref_exists
version: 1
standard: Define-XML
description: |
  Comment ID referenced by a dataset or variable must exist in the Comments sheet.
scope:
  classes: []
  domains: []
check:
  all:
  - name: comment_id
    operator: empty
  - name: __comment_exists
    operator: equal_to
    value: yes
outcome:
  message: DEFINE_ENTITY_COMMENT_REF_EXISTS
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.15
  cited_guidance: |
    def:CommentOID -- Must match the OID of a def:CommentDef element in the same MetaDataVersion.
  executability: predicate
  license: MIT
