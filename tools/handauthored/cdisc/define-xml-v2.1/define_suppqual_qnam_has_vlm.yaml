id: define_suppqual_qnam_has_vlm
version: 1
standard: Define-XML
description: |
  Every unique QNAM value in a SUPPQUAL dataset must have a corresponding WhereClauseDef entry in define.xml. Missing VLM entries mean the reviewer has no metadata for that supplemental qualifier.
scope:
  classes: []
  domains: []
check:
  all:
  - name: QNAM
    operator: not_in_define_vlm
    value: __whereClauseDef__
outcome:
  message: DEFINE_SUPPQUAL_QNAM_HAS_VLM
  severity: Error
provenance:
  source_doc: StudySAS Blog — Define.xml for SUPPQUAL QNAM-Level Metadata (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/definexml-for-suppqual-getting-qnam.html
  executability: predicate
  license: MIT
