id: define_variable_length_positive_int
version: 1
standard: Define-XML
description: |
  Length must be a positive integer when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: length
    operator: empty
  - name: length
    operator: greater_than
    value: 0
outcome:
  message: DEFINE_VARIABLE_LENGTH_POSITIVE_INT
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.12
  cited_guidance: |
    Length -- Integer. The variable length in characters.
  executability: predicate
  license: MIT
