id: define_sendig_version_valid
version: 1
standard: Define-XML
description: |
  SENDIG version must be one of the allowable versions: 3.0, 3.1, 3.1.1.
scope:
  classes: []
  domains: []
check:
  all:
  - name: standard_name
    operator: not_equal_to
    value: SENDIG
  - name: standard_version
    operator: in
    value:
    - '3.0'
    - '3.1'
    - 3.1.1
outcome:
  message: DEFINE_SENDIG_VERSION_VALID
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 1.5.2
  cited_guidance: |
    Define-XML v2.1 can be used to transmit metadata for SENDIG v3.0 and higher.
  executability: predicate
  license: MIT
