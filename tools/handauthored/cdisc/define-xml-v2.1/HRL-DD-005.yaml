id: HRL-DD-005
version: 1
standard: Define-XML
description: SEND/SDTM variables that represent ISO 8601 formatted date/times/datetimes
  (--DTC and --DUR) should have a Data Type value of 'datetime', 'date', 'time', 'partialDate',
  'partialTime', 'partialDatetime', 'incompleteDatetime', or 'durationDatetime'. In
  Define-XML 2.1, 'intervalDatetime' is also a valid Data Type. A Data Type value
  of 'text' is invalid.
scope:
  classes: []
  domains: []
outcome:
  message: Invalid Data Type for --DTC/--DUR variable
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_id_equivalent: DD0149
  executability: reference
  license: MIT
notes: |
  Blocked on `iso8601_data_type_match` operator (--DTC/--DUR variables must declare a datetime/date/time/partialDate/partialDatetime/incompleteDatetime/durationDatetime Data Type). See HANDOFF section 4g.
