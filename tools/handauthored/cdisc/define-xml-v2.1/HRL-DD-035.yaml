id: HRL-DD-035
version: 2
standard: Define-XML
description: |
  Standard column must use a recognized standard name and version format.
scope:
  classes: []
  domains: []
check:
  all:
  - name: standard
    operator: empty
  - name: standard
    operator: matches_regex
    value: ^(SDTMIG|SDTMIG-MD|SDTMIG-AP|SDTMIG-PGx|SENDIG|SENDIG-DART|ADaMIG)\s+\d
outcome:
  message: Standard does not match expected format '<Name> <Version>'. Must use allowable
    standard names (SDTMIG, ADaMIG, SENDIG, etc.).
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 4.1.1
  cited_guidance: |
    Allowable Names: SDTMIG, SDTMIG-MD, SDTMIG-AP, SDTMIG-PGx, SENDIG, SENDIG-DART, ADaMIG.
  executability: predicate
  license: MIT
