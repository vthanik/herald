id: HRL-DD-093
version: 1
standard: Define-XML
description: |
  Method Document ID must exist in the Documents sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: document_id
    operator: empty
  - name: __document_exists_in_doc_spec
    operator: equal_to
    value: yes
outcome:
  message: Method references a Document ID that does not exist in the Documents sheet.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.16
  cited_guidance: |
    leafID -- Reference to the unique ID of the def:leaf element.
  executability: predicate
  license: MIT
