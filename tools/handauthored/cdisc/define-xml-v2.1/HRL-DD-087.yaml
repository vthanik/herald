id: HRL-DD-087
version: 1
standard: Define-XML
description: |
  Variable Codelist ID must exist in the Codelists sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: codelist_id
    operator: empty
  - name: __codelist_exists_in_cl_spec
    operator: equal_to
    value: yes
outcome:
  message: Variable references a Codelist ID that does not exist in the Codelists
    sheet.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.12.1
  cited_guidance: |
    CodeListOID -- Must match the OID of a CodeList element in the same MetaDataVersion.
  executability: predicate
  license: MIT
