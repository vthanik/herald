id: HRL-DD-088
version: 1
standard: Define-XML
description: |
  Variable Method ID must exist in the Methods sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
  - name: method_id
    operator: empty
  - name: __method_exists_in_mt_spec
    operator: equal_to
    value: yes
outcome:
  message: Variable references a Method ID that does not exist in the Methods sheet.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.14
  cited_guidance: |
    MethodOID -- Reference to the unique ID of a MethodDef element.
  executability: predicate
  license: MIT
