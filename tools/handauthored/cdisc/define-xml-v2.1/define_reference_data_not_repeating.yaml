id: define_reference_data_not_repeating
version: 1
standard: Define-XML
description: |
  When Reference Data is 'Yes', Repeating must be 'No'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: reference_data
    operator: not_equal_to
    value: 'Yes'
  - name: repeating
    operator: equal_to
    value: 'No'
outcome:
  message: DEFINE_REFERENCE_DATA_NOT_REPEATING
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.11
  cited_guidance: |
    Business Rule: When IsReferenceData='Yes', set Repeating='No'.
  executability: predicate
  license: MIT
