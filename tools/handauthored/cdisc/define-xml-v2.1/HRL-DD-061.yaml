id: HRL-DD-061
version: 2
standard: Define-XML
description: |
  Predecessor field is required when Origin is 'Predecessor'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: not_equal_to
    value: Predecessor
  - name: predecessor
    operator: non_empty
outcome:
  message: Predecessor variable reference is missing. When Origin is 'Predecessor',
    the predecessor dataset.variable must be specified.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 4.3.2
  cited_guidance: |
    Predecessor -- An entry that is copied from a variable in another dataset. The Description child element identifies the dataset and variable.
  executability: predicate
  license: MIT
