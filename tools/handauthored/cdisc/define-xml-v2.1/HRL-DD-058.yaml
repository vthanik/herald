id: HRL-DD-058
version: 1
standard: Define-XML
description: |
  SDTM Origin Source must be a valid value.
scope:
  classes: []
  domains: []
check:
  all:
  - name: purpose
    operator: not_equal_to
    value: Tabulation
  - name: source
    operator: empty
  - name: source
    operator: in
    value:
    - Subject
    - Investigator
    - Vendor
    - Sponsor
outcome:
  message: 'SDTM Source value is not valid. Must be one of: Subject, Investigator,
    Vendor, Sponsor.'
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 4.3.2.1
  cited_guidance: |
    Allowed Source Values for SDTM: Subject, Investigator, Vendor, Sponsor.
  executability: predicate
  license: MIT
