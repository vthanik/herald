id: DEFINE-239
authority: CDISC
standard: Define-XML
standard_versions:
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
check:
  narrative: The value of the IsReferenceData attribute must be "Yes" when the ItemGroupDef
    references a Trial Design dataset.
outcome:
  message: The value of IsReferenceData[@IsReferenceData] is not "Yes" for ItemGroupDef[@Name]/ItemRef[@ItemOID]
    when ItemGroupDef/def:Class/@Name="TRIAL DESIGN".
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
  define_rule_id: 239
  license: CC-BY-4.0
  applicable_versions: 2.1 only
  source_type: Specification
  xpaths: /ODM/Study/MetaDataVersion/ItemGroupDef
  element: ItemGroupDef
  attribute: IsReferenceData
