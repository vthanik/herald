id: DEFINE-238
authority: CDISC
standard: Define-XML
standard_versions:
- '2.0'
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
check:
  narrative: Attribute OrderNumber must be provided for the ItemRef element when there
    is at least one OrderNumber attribute value provided for the same parent def:ValueListDef
    or def:ItemGroupDef.
outcome:
  message: Attribute OrderNumber is missing for element ItemRef[@ItemOID] in $Parent[@OID]/ItemRef[@ItemOID].
    The  OrderNumber attribute must be provided for all or none of the ItemRef elements
    in $Parent[@OID].
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
  define_rule_id: 238
  license: CC-BY-4.0
  applicable_versions: Both 2.0 and 2.1
  source_type: Specification
  xpaths: /ODM/Study/MetaDataVersion/def:ValueListDef/ItemRef
  element: ItemRef
  attribute: OrderNumber
