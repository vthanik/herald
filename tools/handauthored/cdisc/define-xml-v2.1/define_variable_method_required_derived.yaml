id: define_variable_method_required_derived
version: 2
standard: Define-XML
description: |
  Method is required when Origin is 'Derived'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: not_equal_to
    value: Derived
  - name: method_id
    operator: non_empty
outcome:
  message: DEFINE_VARIABLE_METHOD_REQUIRED_DERIVED
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.9.2; 5.3.12.3
  cited_guidance: |
    MethodOID -- Conditional. Required when the Type attribute for the def:Origin is 'Derived'. If the variable is derived, a MethodDef must be provided.
  executability: predicate
  license: MIT
