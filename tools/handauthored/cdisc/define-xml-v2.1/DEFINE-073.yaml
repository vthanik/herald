id: DEFINE-073
authority: CDISC
standard: Define-XML
standard_versions:
- '2.0'
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
check:
  narrative: The MethodOID attribute must be provided on the  ItemRef element when
    the Origin Type attribute on the corresponding ItemDef element is "Derived".
outcome:
  message: ItemRef[@ItemOID] is missing the MethodOID when ItemDef[@OID]/@Name variable
    has def:Origin/@Type  = "Derived".
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: narrative
  define_rule_id: 73
  license: CC-BY-4.0
  applicable_versions: Both 2.0 and 2.1
  source_type: Specification
  xpaths: "/ODM/Study/MetaDataVersion/ItemGroupDef/ItemRef\r\r\n/ODM/Study/MetaDataVersion/def:ValueListDef/ItemRef"
  element: ItemRef
  attribute: MethodOID
