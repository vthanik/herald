id: HRL-DD-082
version: 1
standard: Define-XML
description: |
  Method ID referenced by a variable must exist in the Methods sheet.
scope:
  classes: []
  domains: []
check:
  all:
  - name: method_id
    operator: empty
  - name: __method_exists
    operator: equal_to
    value: yes
outcome:
  message: Method ID referenced by a variable does not exist in the Methods sheet.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.14
  cited_guidance: |
    MethodOID -- Reference to the unique ID of a MethodDef element. Required for each unique value of the MethodOID attribute.
  executability: predicate
  license: MIT
