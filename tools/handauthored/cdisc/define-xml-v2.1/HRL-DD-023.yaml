id: HRL-DD-023
version: 1
standard: Define-XML
description: |
  When a Variables-sheet row has Origin='Assigned', the Method column must be null. Assigned values are fixed sponsor assignments, not derivations; they do not carry an associated MethodDef.
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: not_equal_to
    value: Assigned
  - name: method_id
    operator: empty
outcome:
  message: Origin='Assigned' but a Method is set. Assigned values are documented by
    their Assigned Value, not by a MethodDef.
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1
    § 5.3.9.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml
  executability: predicate
  license: MIT
