id: HRL-DD-008
version: 1
standard: Define-XML
description: |
  Analysis Results Metadata was developed specifically for ADaM and therefore should not be included with SDTM or SEND defines. Analysis Results Metadata inclusion is indicated by the presence of the arm:AnalysisResultDisplays element.
scope:
  classes: []
  domains: []
outcome:
  message: ARM metadata included in non ADaM define.xml
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_id_equivalent: DD0087
  executability: blocker:requires-op:arm_absent_in_non_adam_define
  license: MIT
notes: Blocked on `arm_absent_in_non_adam_define` operator (SDTM/SEND define.xml must
  not contain arm:AnalysisResultDisplays). See HANDOFF section 4i.
