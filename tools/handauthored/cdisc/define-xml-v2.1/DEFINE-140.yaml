id: DEFINE-140
authority: CDISC
standard: Define-XML
standard_versions:
- '2.0'
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
  datasets:
  - Define_Variable_Metadata
check:
  all:
  - name: data_type
    operator: non_empty
outcome:
  message: The value of DataType[@DataType] is not one of "text", "integer", "float",
    "date", "datetime", "time", "partialDate", "partialTime", "partialDatetime", "incompleteDatetime",
    "durationDatetime", "intervalDatetime" for ItemDef[@Name].
  severity: Medium
provenance:
  source_document: CDISC Define-XML v2.1 Conformance Rules
  executability: predicate
  define_rule_id: 140
  license: CC-BY-4.0
  applicable_versions: Both 2.0 and 2.1
  source_type: Schema
  xpaths: /ODM/Study/MetaDataVersion/ItemDef
  element: ItemDef
  attribute: DataType
  builder_dataset: Define_Variable_Metadata
