id: HRL-DD-102
version: 2
standard: Define-XML
description: |
  ARM AnalysisVariable is required when AnalysisResults are defined.
scope:
  classes: []
  domains: []
check:
  all:
  - name: variables
    operator: non_empty
outcome:
  message: AnalysisVariable is missing in the AnalysisResults sheet. Variables must
    be populated.
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: ARM 1.0
  cited_guidance: |
    P21 DD0096: The armAnalysisVariable in the Analysis Results Metadata is missing and must be populated.
  executability: predicate
  license: MIT
