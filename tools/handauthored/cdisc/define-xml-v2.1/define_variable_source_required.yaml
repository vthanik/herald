id: define_variable_source_required
version: 2
standard: Define-XML
description: |
  Source is required for SDTM and ADaM variables when Origin is populated and not equal to 'Predecessor'.
scope:
  classes: []
  domains: []
check:
  all:
  - name: origin
    operator: in
    value: Predecessor
  - name: origin
    operator: empty
  - name: source
    operator: non_empty
outcome:
  message: DEFINE_VARIABLE_SOURCE_REQUIRED
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 4.3.2.1; 4.3.2.2
  cited_guidance: |
    Source is required for SDTM and ADaM datasets when Origin Type is not Predecessor.
  executability: predicate
  license: MIT
