id: DEFINE-259
authority: CDISC
standard: Define-XML
standard_versions:
- '2.0'
- '2.1'
severity: Medium
scope:
  classes: []
  domains: []
check:
  narrative: The value of attribute ID must start with either a letter or underscore
    (_), and may contain only letters, digits, underscores, hyphens and periods.
outcome:
  message: The value of attribute ID[@ID] does not start with either a letter or underscore
    (_) or contains characters other than letters, digits, underscores, hyphens and
    periods.
  severity: Medium
provenance:
