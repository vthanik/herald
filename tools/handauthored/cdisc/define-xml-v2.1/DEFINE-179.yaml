check:
  narrative: For NCI/CDISC Controlled Terminology, the value of CodedValue must exactly
    match the CDISC Submission Value from the published Controlled Terminology.
outcome:
  message: CodeList[@Name]/EnumeratedItem[@CodedValue]/@CodedValue does not match
    CDISC Submission Value for CDISC Controlled Terminology with C-Code CodeList[@Name]/Alias[@Name].
  severity: Medium
