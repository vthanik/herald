id: define_dataset_class_required
version: 1
standard: Define-XML
description: |
  Class is required for datasets following SDTM, SEND, or ADaM standards.
scope:
  classes: []
  domains: []
check:
  all:
  - name: standard
    operator: empty
  - name: class
    operator: non_empty
outcome:
  message: DEFINE_DATASET_CLASS_REQUIRED
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: 5.3.11.2
  cited_guidance: |
    def:Class -- Conditional. Required when the ItemGroupDef describes a dataset that follows SDTM, SEND, or ADaM.
  executability: predicate
  license: MIT
