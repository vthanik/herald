provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.0; OCCDS v1.0; OCCDS v1.1 3; 3.2.4; 3.2.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.0, Section 3, Item 6 (General Timing Variable Conventions): Variables whose names end in DTF are date imputation flags. *DTF variables represent the level of imputation of the *DT variable based on the source SDTM DTC variable. *DTF = Y if the entire date is imputed. *DTF = M if month and day are imputed. *DTF = D if only day is imputed. *DTF = null if *DT equals the SDTM DTC variable date part equivalent. If a date was imputed, *DTF must be populated and is required. Both *DTF and *TMF may be needed to describe the level of imputation in *DTM if imputation was done.

    OCCDS v1.0, Section 3.2.4, Table 3.2.4.1: CDISC Notes for ASTDTF state: "Conditional on whether any imputation is done for the start date."

    OCCDS v1.1, Section 3.2.4, Table 3.2.4.1: CDISC Notes for ASTDTF state: "Conditional on whether ASTDT (or the date part of ASTDTM) was imputed."
