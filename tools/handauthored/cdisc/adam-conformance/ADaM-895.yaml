- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: CRITyFL where y is an integer [1-99, not zero-padded]
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: CRITyFL is present
outcome:
  message: A variable with a prefix of CRIT, a suffix of FL and containing either
    a one-digit or two-digit number (CRITyFL) is present and a variable with the same
    root without a suffix of FL (CRITy) is not present
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.1 3.3.4
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.1, Section 3.3.4, Table 3.3.4.2: Character flag variable
    indicating whether the criterion defined in CRITy was met by the data on the record.
    See CRITy for more information regarding how to use CRITy and CRITyFL to indicate
    whether a criterion is met. Required if CRITy exists.'
