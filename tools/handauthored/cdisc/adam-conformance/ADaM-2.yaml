  condition_failure: A variable is present in ADaM with the same name as a variable
    present in SDTM
outcome:
  message: A variable is present in ADaM with the same name as a variable present
    in SDTM but the variables do not have identical labels
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: Model v2.1; ADaMIG v1.0 4.1.2; 3
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    Model v2.1, Section 4.1.2: Any ADaM variable with the same name as an SDTM variable is required to be a copy of the SDTM variable, and its label, attributes, and values cannot be modified. ADaM adheres to the principle of harmonization known as "same name, same meaning, and same values."

    ADaMIG v1.0, Section 3, Item 4 (General Variable Naming Conventions): Any ADaM variable whose name is the same as an SDTM variable must be a copy of the SDTM variable, and its label, meaning, and values must not be modified. ADaM adheres to a principle of harmonization known as "same name, same meaning, same values."
