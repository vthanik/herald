outcome:
  message: SHIFTy is present and all of the following variable pairs (BASECATy, AVALCATy),
    (BNRIND, ANRIND), (ByIND, AyIND), (BTOXGR, ATOXGR), (BTOXGRL, ATOXGRL), (BTOXGRH,
    ATOXGRH), (BASE, AVAL) and (BASEC, AVALC) are not present
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.4.1
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: 'ADaMIG v1.2, Section 3.3.4.1, Table 3.3.4.1.1: SHIFTy can only
    be based on the change in value of any of the following pairs (BASECATy, AVALCATy),
    (BNRIND, ANRIND), (ByIND, AyIND), (BTOXGR, ATOXGR), (BTOXGRL, ATOXGRL), (BTOXGRH,
    ATOXGRH), (BASE, AVAL) or (BASEC, AVALC).'
