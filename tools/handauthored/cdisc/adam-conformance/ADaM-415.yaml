variable: TRTSEQP
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: TRTSEQPN is populated
outcome:
  message: On a given record, TRTSEQPN is populated and TRTSEQP is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.2
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.2, Table 3.2.4: There must be a one-to-one relationship between TRTSEQPN and TRTSEQP within a study.
    TRTSEQPN cannot be present unless TRTSEQP is also present. When TRTSEQP and TRTSEQPN are present, then on a given record, either both must be populated or both must be null.
