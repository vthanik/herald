id: '391'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes:
  - BASIC DATA STRUCTURE
  - OCCURRENCE DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ATOXGRN
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: ATOXGR is populated
outcome:
  message: On a given record, ATOXGR is populated and ATOXGRN is not populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.7
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.7,  Table 3.3.7.1: There must be a one-to-one relationship between ATOXGRN and ATOXGR within a parameter.
    ATOXGRN cannot be present unless ATOXGR is also present. When ATOXGR and ATOXGRN are present, then on a given record, either both must be populated or both must be null.
