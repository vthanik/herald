id: '409'
authority: CDISC
standard: ADaM-IG
standard_versions:
- '1.2'
- '1.3'
severity: Medium
scope:
  classes: BASIC DATA STRUCTURE
  domains: []
  exclude_domains: []
variable: ABLFN
define_element: ''
check:
  narrative: ''
  condition_success: ''
  condition_failure: On rows where both ABLFN and ABLFL are both populated.
outcome:
  message: There is more than one value of ABLFN for a given value of ABLFL, considering
    only those rows on which both variables are populated
  severity: Medium
provenance:
  source_document: CDISC ADaM Conformance Rules v5.0
  source_document_section: ADaMIG v1.2 3.3.8
  source_url: https://www.cdisc.org/standards/foundational/adam/adam-conformance-rules-v5-0
  cited_guidance: |-
    ADaMIG v1.2, Section 3.3.8, Table 3.3.8.1: There must be a one-to-one relationship between ABLFN and ABLFL.
    ABLFN cannot be present unless ABLFL is also present. When ABLFL and ABLFN are present, then on a given record, either both must be populated or both must be null.
  source_version: '1'
