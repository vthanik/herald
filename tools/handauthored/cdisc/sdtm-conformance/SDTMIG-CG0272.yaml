id: CG0272
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
severity: Medium
scope:
  classes: TDM
  domains: TS
  exclude_domains: []
variable: TSVAL
check:
  narrative: TSVAL = null or 'HEALTHY SUBJECTS'
  condition: TSPARMCD = 'TDIGRP' and record exists where TSPARMCD = 'HLTSUBJI' and
    TSVAL = 'Y'
outcome:
  message: TSVAL = null or 'HEALTHY SUBJECTS'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 IG v3.2[7.4]|IG v3.2[Appendix C1]
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: IG v3.2[7.4][Assumption 3][Further information about the parameters
    is included below in Table 1. TSVAL may have controlled terminology depending
    on the value of TSPARMCD]|IG v3.2[Appendix C1][If the study population is healthy
    subjects (i.e., healthy subjects flag is Y), this parameter is not expected. If
    the healthy subject flag is N, then this parameter would contain the diagnosis/medical
    problem of the study population. [Validation rule; IF healthy volunteers = N then
    TDIGRP must be present and not null]
  source_version: '2'
  license: CC-BY-4.0
  executability: narrative

