id: CG0234
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: --ENRTPT
check:
  narrative: --ENRTPT in ('BEFORE', 'COINCIDENT', 'ONGOING', 'UNKNOWN')
  condition: --ENTPT corresponds to the date of collection or assessment.
outcome:
  message: --ENRTPT in ('BEFORE', 'COINCIDENT', 'ONGOING', 'UNKNOWN')
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.4.7
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'If the reference time point corresponds to the date of collection
    or assessment: Start values: an observation can start BEFORE that time point,
    can start COINCIDENT with that time point, or it is unknown (U) when it started.
    End values: an observation can end BEFORE that time point, can end COINCIDENT
    with that time point, can be known that it didn''t end but was ONGOING, or it
    is unknown (U) at all when it ended or if it was ongoing. AFTER is not a valid
    value in this case because it would represent an event after the date of collection.'
  source_version: '1'
  license: CC-BY-4.0
  executability: narrative

