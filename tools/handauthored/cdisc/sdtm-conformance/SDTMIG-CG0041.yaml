id: CG0041
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: AE
  exclude_domains: []
variable: AESER
check:
  narrative: AESER = 'Y'
  condition: AESCAN = 'Y' or AESCONG = 'Y' or AESDISAB = 'Y' or AESDTH = 'Y' or AESHOSP
    = 'Y' or AESLIFE = 'Y' or AESOD = 'Y' or AESMIE = 'Y'
outcome:
  message: AESER = 'Y'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: If categories of serious events are collected secondarily to a leading
    question, as in the example below, the values of the variables that capture reasons
    an event is considered serious (i.e., AESCAN, AESCONG, etc.) may be null. For
    example, if Serious is answered "No, " the values for these variables may be null.
    However, if Serious is answered "Yes, " at least one of them will have a "Y" response.
  source_version: '1'
  license: CC-BY-4.0
  executability: narrative

