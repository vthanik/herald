id: CG0237
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes:
  - EVT
  - INT
  domains: ALL
  exclude_domains: []
variable: --DTC
check:
  narrative: --DTC is date/time of recording/data acquisition
  condition: --DTC present in dataset
outcome:
  message: --DTC is date/time of recording/data acquisition
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.4.8
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: For any domain based on the Findings general observation class,
    such as lab tests which are based on a specimen, the collection date is likely
    to be tied to when the specimen or source of the finding was captured, not necessarily
    when the data was recorded. in order to ensure that the critical timing information
    is always represented in the same variable, the --DTC variable is used to represent
    the time of specimen collection.
  source_version: '1'
