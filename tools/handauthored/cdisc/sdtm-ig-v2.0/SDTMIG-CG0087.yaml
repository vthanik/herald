id: CG0087
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes:
  - EVT
  - INT
  domains:
  - NOT(AE
  - DS
  - DV
  - EX)
  exclude_domains: []
variable: --OCCUR
check:
  all:
  - operator: empty
    name: --PRESP
  - operator: non_empty
    name: --OCCUR
outcome:
  message: --OCCUR = null
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.4 Model v1.4[2.2.1 (Interventions )]|Model v1.4[2.2.2
    (Events)]
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'Model v1.4[2.2.1 (Interventions )][--PRESP: Used when a specific
    intervention is pre-specified on a CRF. Values should be "Y" or null.][--OCCUR:
    Used to record whether a pre-specified event occurred when information about the
    occurrence of a specific event is solicited.][--STAT: Used to indicate when a
    question about the occurrence of a pre-specified event was not answered. Should
    be null or hav a value of NOT DONE]|Model v1.4[2.2.2 (Events)][--PRESP: Used to
    indicate whether the event describe by --TERM was pre-specified on a CRF. Value
    is Y for pre-specified events, null for spontaneously reported events.][--OCCUR:
    Used to record whether a pre-specified event occurred when information about the
    occurrence of a specific event is solicited.][--STAT: Used to indicate when a
    question about the occurrence of a pre-specified event was not answered . Should
    be null or have a value of NOT DONE]'
  source_version: '1'
