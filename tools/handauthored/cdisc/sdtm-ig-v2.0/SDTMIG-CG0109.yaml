id: CG0109
authority: CDISC
standard: SDTM-IG
standard_versions: '3.2'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: ACTARMCD
check:
  all:
  - name: ACTARMCD
    operator: is_not_contained_by_case_insensitive
    value:
    - SCRNFAIL
    - NOTASSGN
    - NOTTRT
  - name: USUBJID
    operator: is_not_contained_by
    value: $usubjids_in_ex
outcome:
  message: DM.ACTARMCD in ('SCRNFAIL', 'NOTASSGN', 'NOTTRT')
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'Specification[ACTARMCD: Randomized subjects who were not treated
    will be given a value of NOTTRT. Values should be "SCRNFAIL" for screen failures
    and "NOTASSGN" for subjects not assigned to treatment]|Assumption 4[Subjects withdrawn
    from a trial before assignment to an Arm, if they are not screen failures, should
    have ARMCD = ''NOTASSGN'' and ARM = ''Not Assigned''.]|Assumption 10[subjects
    who are ineligible for treatment (e.g., screen failures with ARMCD=SCRNFAIL),
    subjects who were enrolled but not assigned to an arm (ARMCD=NOTASSGN), or subjects
    who were randomized but not treated (ACTARMCD=NOTTRT), RFSTDTC will be null.]'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000366
operations:
- domain: EX
  id: $usubjids_in_ex
  name: USUBJID
  operator: distinct
