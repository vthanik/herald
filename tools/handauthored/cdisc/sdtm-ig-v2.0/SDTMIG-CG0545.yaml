id: CG0545
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: SM
  exclude_domains: []
variable: MIDSTYPE
check:
  all:
  - name: MIDSTYPE
    operator: is_contained_by
    value: $tm_midstype
  - name: TMRPT
    operator: equal_to
    value: 'N'
  - name: MIDSTYPE
    operator: is_not_unique_set
    value: USUBJID
outcome:
  message: MIDSTYPE is unique per subject
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 5.5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: For Disease Milestones that can occur only once (TMRPT = "N") the
    value of MIDS may be the value in MIDSTYPE or may an abbreviated version.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000216
operations:
- domain: TM
  id: $tm_midstype
  name: MIDSTYPE
  operator: distinct
