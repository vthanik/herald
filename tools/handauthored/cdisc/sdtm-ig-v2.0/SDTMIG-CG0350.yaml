id: CG0350
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: --SCAT
check:
  all:
  - name: --SCAT
    operator: equal_to_case_insensitive
    value: $domain_label
outcome:
  message: --SCAT ^= Domain Name
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.2.6
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Values for --CAT and --SCAT should not be redundant with the domain
    name or dictionary classification provided by --DECOD and --BODSYS.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000219
operations:
- id: $domain_label
  operator: domain_label
