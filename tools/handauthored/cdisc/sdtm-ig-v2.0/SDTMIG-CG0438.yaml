id: CG0438
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
severity: Medium
scope:
  classes: TDM
  domains: TS
  exclude_domains: []
variable: TSPARMCD
check:
  all:
  - name: TSPARMCD
    operator: equal_to
    value: AGEMIN
  - name: TSVAL
    operator: non_empty
  - name: TSVAL
    negative: yes
    operator: invalid_duration
outcome:
  message: TSVAL conforms to ISO 8601 time period
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 7.4|Appendix C1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Further information about the parameters is included below in Table
    1. TSVAL may have controlled terminology depending on the value of TSPARMCD
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000730
