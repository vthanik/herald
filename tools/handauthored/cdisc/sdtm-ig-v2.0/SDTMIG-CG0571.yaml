id: CG0571
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: --TPT
check:
  narrative: --TPT and --TPTNUM have a one-to-one relationship per unique values of
    VISITNUM
  condition: VISITNUM present in dataset and --TPTREF not present in dataset
outcome:
  message: --TPT and --TPTNUM have a one-to-one relationship per unique values of
    VISITNUM
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.4.10
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Within the context that defines uniqueness for a time point, which
    may include domain, visit, and reference time point, there must be a one-to-relationship
    between values of --TPT and --TPTNUM. in other words, if domain, visit, and reference
    time point uniquely identify subject data, then if two subjects have records with
    the same values of DOMAIN, VISITNUM, --TPTREF, and --TPTNUM, then these records
    may not have different time point descriptions in --TPT.
  source_version: '1'
  license: CC-BY-4.0
  executability: narrative

