id: CG0411
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: SUPP--
  exclude_domains: []
variable: RDOMAIN
check:
  any:
  - all:
    - name: RDOMAIN
      operator: equal_to
      value: DM
      value_is_literal: yes
    - name: USUBJID
      operator: is_not_unique_set
      value: QNAM
  - all:
    - name: RDOMAIN
      operator: not_equal_to
      value: DM
      value_is_literal: yes
    - name: USUBJID
      operator: is_not_unique_set
      value:
      - IDVAR
      - IDVARVAL
      - QNAM
outcome:
  message: IDVAR, IDVARVAL, and QNAM a unique combination per parent subject record
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 8.4.1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: One record per IDVAR, IDVARVAL, and QNAM value per subject
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000203
