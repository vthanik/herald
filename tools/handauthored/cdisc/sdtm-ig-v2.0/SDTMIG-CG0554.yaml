id: CG0554
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: DOMAIN
check:
  any:
  - all:
    - name: DOMAIN
      operator: prefix_matches_regex
      prefix: 2
      value: (AP|ap)
    - name: APID
      operator: not_exists
  - all:
    - name: DOMAIN
      operator: not_prefix_matches_regex
      prefix: 2
      value: (AP|ap)
    - name: STUDYID
      operator: exists
    - name: --SEQ
      operator: exists
    - name: USUBJID
      operator: not_exists
    - name: SPDEVID
      operator: not_exists
    - name: POOLID
      operator: not_exists
    - name: SPTOBID
      operator: not_exists
    - name: STOCONID
      operator: not_exists
outcome:
  message: STUDYID, DOMAIN, and --SEQ exist and at least one of USUBJID, APID, SPDEVID,
    or POOLID
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.7 2.2.4
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'STUDYID, DOMAIN, and --SEQ are required in all domains based on
    one of the 3 general observation classes. Each general class domain must also
    include at least one of the following subject identifiers: USUBJID, APID, SPDEVID,
    or POOLID.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000107
