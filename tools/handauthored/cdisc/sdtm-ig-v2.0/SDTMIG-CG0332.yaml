id: CG0332
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: High
scope:
  classes: ALL
  domains:
  - NOT(RELREC
  - RELSUB
  - SUPP--)
  exclude_domains: []
variable: dataset_name
check:
  all:
  - name: dataset_name
    operator: matches_regex
    value: ^[a-z(?-i)]{2}[a-z0-9(?-i)]{1,2}
  - name: dataset_name
    operator: not_prefix_matches_regex
    prefix: 2
    value: (AP|FA)
  - name: dataset_name
    operator: prefix_is_not_contained_by
    prefix: 2
    value: $list_dataset_names
outcome:
  message: The first two characters of the dataset name must equal a domain that is
    present in the study
  severity: High
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.1.7
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Split dataset names can be up to four characters in length. For
    example; if splitting by --CAT; then dataset names would be the domain name plus
    up to two additional characters (e.g., QS36 for SF-36). If splitting Findings
    About by parent domain; then the dataset name would be the domain name plus the
    two-character domain code describing the parent domain code (e.g., FACM). The
    four-character dataset-name limitation allows the use of a Supplemental Qualifier
    dataset associated with the split dataset.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000539
operations:
- id: $list_dataset_names
  operator: dataset_names
