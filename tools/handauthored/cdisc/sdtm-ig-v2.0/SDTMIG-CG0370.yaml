id: CG0370
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains:
  - CO
  - SUPP--
  - RELREC
  exclude_domains: []
variable: RDOMAIN
check:
  all:
  - name: RDOMAIN
    operator: exists
  - name: IDVAR
    operator: non_empty
  - name: IDVAR
    operator: is_not_contained_by
    value: $rdomain_variables
outcome:
  message: IDVAR is variable in domain = RDOMAIN
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.4 2.2.7
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Identifying variable in the parent dataset that identifies the record(s)
    to which the comment applies.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000712
operations:
- domain: SUPP--
  id: $rdomain_variables
  name: IDVAR
  operator: distinct
  value_is_reference: yes
