id: CG0662
authority: CDISC
standard: SDTM-IG
standard_versions: '3.2'
severity: Medium
scope:
  classes: SPC
  domains: SE
  exclude_domains: []
variable: --SEQ
check:
  all:
  - name: --SEQ
    operator: target_is_not_sorted_by
    value:
    - name: --STDTC
      null_position: last
      sort_order: asc
    within: USUBJID
outcome:
  message: --SEQ is in consistent chronological order
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5 SE
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Sequence Number given to ensure uniqueness of subject records within
    a domain. Should be assigned to be consistent chronological order.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000535
