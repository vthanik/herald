id: CG0348
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: FND
  domains: ALL
  exclude_domains: []
variable: --ORRES
check:
  all:
  - name: --ORRES
    operator: empty
outcome:
  message: --ORRES ^= null
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.5.1.1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'The --ORRES variable contains the result of the measurement or
    finding as originally received or collected. --ORRES is an expected variable and
    should always be populated; with two exceptions: When --STAT = ''NOT DONE''. --ORRES
    should generally not be populated for derived records.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
