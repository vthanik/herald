id: CG0014
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: variable_name
check:
  all:
  - name: variable_name
    operator: not_contains_all
    value: $required_variables
outcome:
  message: Variable present in dataset and ^= null
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.1.5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Required variables must always be included in the dataset and cannot
    be null for any record.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000355
operations:
- id: $required_variables
  operator: required_variables
- id: $dataset_variables
  operator: get_column_order_from_dataset
