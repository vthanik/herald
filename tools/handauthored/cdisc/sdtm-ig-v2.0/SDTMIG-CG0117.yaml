id: CG0117
authority: CDISC
standard: SDTM-IG
standard_versions: '3.2'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: ACTARM
check:
  all:
  - operator: missing_in_ref
    name: ACTARM
    reference_dataset: TA
    reference_key: ARM
  - operator: is_not_contained_by
    name: ACTARM
    value:
    - Screen Failure
    - Not Assigned
    - Not Treated
    - Unplanned Treatment
outcome:
  message: ACTARM in ('Screen Failure', 'Not Assigned', 'Not Treated', 'Unplanned
    Treatment')
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Description of actual Arm. When an Arm is not planned (not in Trial
    Arms), ACTARM will be “Unplanned Treatment”. Randomized subjects who were not
    treated will be given a value of “Not Treated”. Values should be “Screen Failure”
    for screen failures and “Not Assigned” for subjects not assigned to treatment.
    Restricted to values in Trial Arms in all other cases.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
