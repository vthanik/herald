id: CG0562
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: FND
  domains: ALL
  exclude_domains: []
variable: --REPNUM
check:
  all:
  - name: --REPNUM
    operator: exists
  - name: $record_count_per_subject_test_timing
    operator: greater_than
    value: 1
  - any:
    - name: --REPNUM
      operator: empty
    - name: --REPNUM
      operator: is_not_unique_set
      regex: ^\d{4}-\d{2}-\d{2}
      value:
      - USUBJID
      - --TESTCD
      - $TIMING_VARIABLES
outcome:
  message: --REPNUM ^= null and unique per subject per test per the timing variables
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.7 Table 2.2.3
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: The instance number of a test that is repeated within a given timeframe
    for the same test. The level of granularity can vary (e.g., within a time point
    or within a visit). For example, multiple measurements of blood pressure or multiple
    analyses of a sample.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-001034
operations:
- id: $TIMING_VARIABLES
  key_name: role
  key_value: Timing
  operator: get_dataset_filtered_variables
- group:
  - USUBJID
  - --TESTCD
  - $TIMING_VARIABLES
  id: $record_count_per_subject_test_timing
  operator: record_count
  regex: ^\d{4}-\d{2}-\d{2}
