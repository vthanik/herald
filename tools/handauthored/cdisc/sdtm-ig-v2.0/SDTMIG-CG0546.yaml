id: CG0546
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: SM
  exclude_domains: []
variable: MIDS
check:
  narrative: MIDS is suffixed with a sequence number in consistent chronological order
  condition: MIDSTYPE = TM.MIDSTYPE and TM.TMRPT = 'Y'
outcome:
  message: MIDS is suffixed with a sequence number in consistent chronological order
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 5.5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: For types of Disease Milestones that can occur multiple times, MIDS
    will usually be an abbreviated version of MIDSTYPE and will always end with a
    sequence number. Sequence numbers should start with one and indicate the chronological
    order of the instances of this type of Disease Milestone.
  source_version: '1'
