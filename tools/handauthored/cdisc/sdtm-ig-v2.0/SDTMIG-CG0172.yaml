id: CG0172
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: FND
  domains: SS
  exclude_domains: []
variable: SSSTRESC
check:
  all:
  - name: SSSTRESC
    operator: equal_to
    value: DEAD
    value_is_literal: yes
  - name: SSDTC
    operator: date_less_than
    value: $max_ds_dsstdtc
outcome:
  message: SSDTC >= all DS.DSSTDTC
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.3
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Subject Status does not contain details about the circumstances
    of a subject's status. The response to the status assessment may trigger collection
    of additional details but those details are to be stored in appropriate separate
    domains. For example, if a subject's Survival Status is "DEAD", the date of death
    must be stored in DM and within a final disposition record in DS. Only the status
    collection date, the status question and the status response are stored in SS.
  source_version: '2'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000178
operations:
- domain: DS
  group: USUBJID
  id: $max_ds_dsstdtc
  name: DSSTDTC
  operator: max_date
