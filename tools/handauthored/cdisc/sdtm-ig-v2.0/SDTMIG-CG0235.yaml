id: CG0235
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: --ENRTPT
check:
  operator: is_not_contained_by
  name: --ENRTPT
  value:
  - BEFORE
  - COINCIDENT
  - ONGOING
  - AFTER
  - UNKNOWN
outcome:
  message: --ENRTPT in ('BEFORE', 'COINCIDENT', 'ONGOING', 'AFTER', 'UNKNOWN')
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.4.7
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'If the reference time point is prior to the date of collection
    or assessment: Start values: an observation can start BEFORE the reference point,
    can start COINCIDENT with the reference point, can start AFTER the reference point,
    or it may not be known (U) when it started. End values: an observation can end
    BEFORE the reference point, can end COINCIDENT with the reference point, can end
    AFTER the reference point, can be known that it didn''t end but was ONGOING, or
    it is unknown (U) when it ended or if it was ongoing.'
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
