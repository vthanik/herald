id: CG0466
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: FND
  domains: ALL
  exclude_domains: []
variable: --LLOQ
check:
  all:
  - operator: non_empty
    name: --LLOQ
  - operator: matches_regex
    name: --LLOQ
    value: ^[-+]?[0-9]*\.?[0-9]+$
  - operator: empty
    name: --STRESU
outcome:
  message: --LLOQ is expressed using the units in --STRESU
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.4 2.2.3
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Indicates the lower limit of quantitation for an assay. Units will
    be those used for --STRESU.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
