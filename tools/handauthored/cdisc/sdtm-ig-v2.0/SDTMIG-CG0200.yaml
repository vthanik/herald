id: CG0200
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: RELREC
  exclude_domains: []
variable: RELID
check:
  all:
  - name: RELID
    operator: not_present_on_multiple_rows_within
    within: USUBJID
outcome:
  message: Within a subject each unique RELID is present on multiple RELREC records
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 8.2.1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: All records for the same USUBJID that have the same RELID are considered
    "related/associated."
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000484
