id: CG0219
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes:
  - INT
  - FND
  - EVT
  domains:
  - NOT(IE
  - SC)
  exclude_domains: []
variable: $dataset_variables
check:
  all:
  - name: $dataset_variables
    operator: shares_no_elements_with
    value: $timing_variables
outcome:
  message: At least one timing variable present in dataset
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.4
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: In general, all domains based on the three general observation classes
    should have at least one Timing variable. in the Events or Interventions general
    observation class this could be the start date of the event or intervention. in
    the Findings observation class where data are usually collected at multiple visits,
    at least one Timing variable must be used.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000575
operations:
- id: $dataset_variables
  operator: get_column_order_from_dataset
- id: $timing_variables
  key_name: role
  key_value: Timing
  operator: get_model_filtered_variables
