id: CG0304
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: AE
  exclude_domains: []
variable: AEREASND
check:
  all:
  - name: AEREASND
    operator: exists
outcome:
  message: AEREASND not present in dataset
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'The following Qualifiers would not be used in AE: --OCCUR, --STAT,
    and--REASND. They are the only Qualifiers from the SDTM Events Class not in the
    AE domain. They are not permitted because the AE domain contains only records
    for adverse events that actually occurred.'
