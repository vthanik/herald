id: CG0141
authority: CDISC
standard: SDTM-IG
standard_versions: '3.2'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: ACTARM
check:
  all:
  - name: ACTARM
    operator: is_contained_by
    value:
    - Screen Failure
    - Not Assigned
    - Not Treated
    - SCREEN FAILURE
    - NOT ASSIGNED
    - NOT TREATED
  - name: RFENDTC
    operator: non_empty
outcome:
  message: RFENDTC = null
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 IG v3.2[5]
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'IG v3.2[5][Specification: RFENDTC][Required for all randomized
    subjects; null for screen failures or unassigned subjects.]|IG v3.2[5][Specification:
    ACTARM][Randomized subjects who were not treated will be given a value of “Not
    Treated”. Values should be “Screen Failure” for screen failures and “Not Assigned”
    for subjects not assigned to treatment.]|IG v3.2[5][Assumption 10][This definition
    applies for most interventional studies, when the start of treatment is the natural
    and preferred starting point for study day variables and thus the logical value
    for RFSTDTC. In such studies, when data are submitted for subjects who are ineligible
    for treatment (e.g., screen failures with ARMCD=SCRNFAIL), subjects who were enrolled
    but not assigned to an arm (ARMCD=NOTASSGN), or subjects who were randomized but
    not treated (ACTARMCD=NOTTRT), RFSTDTC will be null.]'
