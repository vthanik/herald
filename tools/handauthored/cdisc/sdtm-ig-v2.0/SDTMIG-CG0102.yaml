id: CG0102
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: INT
  domains: EX
  exclude_domains: []
variable: EXDOSE
check:
  all:
  - operator: is_contained_by
    name: EXTRT
    value: PLACEBO
  - operator: not_equal_to
    name: EXDOSE
    value: '0'
outcome:
  message: EXDOSE = 0
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Doses of placebo should be represented by EXTRT = 'PLACEBO' and
    EXDOSE = 0 (indicating 0 mg of active ingredient was taken or administered).
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
