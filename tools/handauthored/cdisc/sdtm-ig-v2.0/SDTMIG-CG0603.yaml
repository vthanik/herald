id: CG0603
authority: CDISC
standard: SDTM-IG
standard_versions: '3.4'
severity: Medium
scope:
  classes: FND
  domains: FA
  exclude_domains: []
variable: --DECOD
check:
  all:
  - name: --DECOD
    operator: non_empty
  - name: --DECOD
    operator: not_equal_to
    value: RELREC.FAOBJ
outcome:
  message: --OBJ = --DECOD
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.4 4.2.7.4
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: When findings are collected about an event or intervention, and
    the name of the event or intervention is collected in an "Other, specify" CRF
    field, the value in --OBJ variable depends on whether the FA record has a parent record
    and whether the "Other, specify" value was coded.
