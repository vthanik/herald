id: CG0143
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: DSTERM
check:
  all:
  - name: DSTERM
    operator: contains
    value: INFORMED CONSENT
  - name: RFICDTC
    operator: date_not_equal_to
    value: $min_ds_dsstdtc
  - name: $min_ds_dsstdtc
    operator: equal_to
    value: DSSTDTC
outcome:
  message: RFICDTC = earliest DS.DSSTDTC
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Specification[This will be the same as the date of informed consent
    in the Disposition domain, if that protocol milestone is documented. Would be
    null only in studies not collecting the date of informed consent.]|Assumption
    13[RFICDTC should correspond to the date of the informed . . . In the event that
    there are multiple informed consents, this will be the date of the first one.]
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000370
operations:
- domain: DS
  group: USUBJID
  id: $min_ds_dsstdtc
  name: DSSTDTC
  operator: min_date
