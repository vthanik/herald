id: CG0043
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: AE
  exclude_domains: []
variable: AESMIE
check:
  all:
  - operator: subject_has_matching_row
    name: USUBJID
    reference_dataset: SUPPAE
    reference_column: QNAM
    expected_value: AESOSP
  - operator: not_equal_to
    name: AESMIE
    value: 'Y'
outcome:
  message: AESMIE = 'Y'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: When a description of Other Medically Important Serious Adverse
    Events category is collected on a CRF, sponsors should place the description in
    the SUPPAE dataset using the standard supplemental qualifier name code AESOSP.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
