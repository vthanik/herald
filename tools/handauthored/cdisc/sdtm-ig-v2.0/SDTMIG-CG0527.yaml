id: CG0527
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: RACE
check:
  all:
  - operator: supp_row_count_exceeds
    name: USUBJID
    ref_dataset: SUPPDM
    qnam_pattern: ^RACE
    threshold: 1
  - operator: not_equal_to
    name: RACE
    value: MULTIPLE
outcome:
  message: RACE = 'MULTIPLE'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 5.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: If multiple races were collected and one was designated as primary;
    RACE in DM should be the primary race and additional races should be reported
    in SUPPDM
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
