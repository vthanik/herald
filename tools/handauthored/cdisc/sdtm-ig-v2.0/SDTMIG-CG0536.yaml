id: CG0536
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: DS
  exclude_domains: []
variable: GEN
check:
  all:
  - operator: is_contained_by
    name: DSCAT
    value: DISPOSITION EVENT
  - operator: is_not_unique_set
    name:
    - USUBJID
    - DSSCAT
    - EPOCH
outcome:
  message: At most one record per subject per DSSCAT per epoch, including null values
    of DSSCAT
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 6.2.3 DS
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'Assumption 2.b[If disposition events for both study participation
    and study treatment(s) are to be represented, then DSSCAT provides this distinction.]|Assumption
    2.b|Assumption 5[ICH E3: Section 10.1 indicates that ''the specific reason for
    discontinuation'' should be presented, and that summaries should be ''grouped
    by treatment and by major reason.'' The CDISC SDS Team interprets this guidance
    as requiring one standardized disposition term (DSDECOD) per disposition event.
    If multiple reasons are reported, the sponsor should identify a primary reason
    and use that to populate DSTERM and DSDECOD. Additional reasons should be submitted
    in SUPPDS.]'
