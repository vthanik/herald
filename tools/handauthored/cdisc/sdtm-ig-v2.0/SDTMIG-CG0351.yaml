id: CG0351
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: variable_name
check:
  all:
  - name: variable_name
    operator: is_not_contained_by
    value: $allowed_variables
outcome:
  message: Variables not in Model List of Allowed Variables for Observation Class
    are in SUPPQUAL
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 3.2.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Using SDTM-specified standard variable names
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000550
operations:
- id: $allowed_variables
  operator: get_model_column_order
