id: CG0147
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: USUBJID
check:
  all:
  - name: USUBJID
    operator: is_contained_by
    value: $ex_usubjid
  - name: RFXENDTC
    operator: not_equal_to
    value: $max_ex_exstdtc
  - name: RFXENDTC
    operator: not_equal_to
    value: $max_ex_exendtc
outcome:
  message: RFXENDTC = latest value of EX.EXSTDTC or EX.EXENDTC
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Equal to the latest value of EXENDTC (or the latest value of EXSTDTC
    if EXENDTC was not collected or is missing).
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000238
operations:
- domain: EX
  id: $ex_usubjid
  name: USUBJID
  operator: distinct
- domain: EX
  group: USUBJID
  id: $max_ex_exstdtc
  name: EXSTDTC
  operator: max_date
- domain: EX
  group: USUBJID
  id: $max_ex_exendtc
  name: EXENDTC
  operator: max_date
