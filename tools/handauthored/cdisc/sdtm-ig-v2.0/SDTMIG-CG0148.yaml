id: CG0148
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: USUBJID
check:
  all:
  - name: USUBJID
    operator: is_contained_by
    value: $ex_usubjid
  - name: RFXSTDTC
    operator: not_equal_to
    value: $min_ex_exstdtc
outcome:
  message: RFXSTDTC = earliest EX.EXSTDTC
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: First date of exposure to any protocol-specified treatment or therapy,
    equal to the earliest value of EXSTDTC.
  source_version: '2'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000239
operations:
- domain: EX
  id: $ex_usubjid
  name: USUBJID
  operator: distinct
- domain: EX
  group: USUBJID
  id: $min_ex_exstdtc
  name: EXSTDTC
  operator: min_date
