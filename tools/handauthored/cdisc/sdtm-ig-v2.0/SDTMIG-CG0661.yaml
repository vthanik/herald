id: CG0661
authority: CDISC
standard: SDTM-IG
standard_versions: '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: --TPT
check:
  all:
  - name: --TPTNUM
    operator: exists
  - name: --TPT
    operator: not_exists
outcome:
  message: --TPT present in dataset
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.4 4.4.10
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: 'When time points are represented in SDTMIG domains, both --TPT
    and --TPTNUM must be used. '
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
