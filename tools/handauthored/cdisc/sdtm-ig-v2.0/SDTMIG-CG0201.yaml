id: CG0201
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: RELREC
  exclude_domains: []
variable: IDVAR
check:
  all:
  - operator: empty
    name: IDVARVAL
  - operator: empty
    name: USUBJID
  - operator: matches_regex
    name: IDVAR
    value: '.*SEQ'
outcome:
  message: IDVAR ^= --SEQ
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 8.3.1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: This example shows how to use the RELREC dataset to represent related
    information that is submitted as two datasets that have a one-to-many relationship.
    in the example below all the records in one domain are being related to all of
    the records in the other, so both USUBJID and IDVARVAL are null.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate

