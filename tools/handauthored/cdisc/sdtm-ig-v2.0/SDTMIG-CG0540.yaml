id: CG0540
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: DS
  exclude_domains: []
variable: ACTARMCD
check:
  all:
  - name: ACTARMCD
    operator: non_empty
  - name: USUBJID
    operator: is_not_contained_by
    value: $ds_usubjid
outcome:
  message: DS records present for subject
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 6.2.3 DS
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: The Disposition dataset provides an accounting for all subjects
    who entered the study and may include protocol milestones, such as randomization,
    as well as the subject's completion status or reason for discontinuation for the
    entire study or each phase or segment of the study, including screening and post-treatment
    follow-up.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000296
operations:
- domain: DS
  id: $ds_usubjid
  name: USUBJID
  operator: distinct
