id: CG0535
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: High
scope:
  classes: EVT
  domains: DS
  exclude_domains: []
variable: DSCAT
check:
  all:
  - name: DSCAT
    operator: is_not_unique_set
    value:
    - USUBJID
    - EPOCH
  - name: DSCAT
    operator: equal_to
    value: DISPOSITION EVENT
  - name: DSSCAT
    operator: not_exists
outcome:
  message: DSSCAT must be present
  severity: High
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 6.2.3 DS
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: If separate disposition events for both study participation and
    study treatment(s) are to be represented, then DSSCAT provides this distinction.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000212
