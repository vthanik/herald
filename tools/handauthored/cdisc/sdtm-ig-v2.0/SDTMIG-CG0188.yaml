id: CG0188
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: FND
  domains: LB
  exclude_domains: []
variable: LBSTNRLO
check:
  all:
  - operator: non_empty
    name: LBSTNRLO
  - operator: matches_regex
    name: LBSTNRLO
    value: ^[-+]?[0-9]*\.?[0-9]+$
  - operator: empty
    name: LBSTRESU
outcome:
  message: LBSTNRLO  is expressed using the units in LBSTRESU
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.3
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Lower end of reference range for continuous measurements for LBSTRESC/LBSTRESN
    in standardized units.
  source_version: '2'
  license: CC-BY-4.0
  executability: predicate
