id: CG0125
authority: CDISC
standard: SDTM-IG
standard_versions: '3.2'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: ACTARMCD
check:
  all:
  - name: ACTARMCD
    operator: is_not_contained_by
    value: TA.ARMCD
outcome:
  message: ACTARMCD in TA.ARMCD
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Code of actual Arm. When an Arm is not planned (not in Trial Arms),
    ACTARMCD will be UNPLAN. Randomized subjects who were not treated will be given
    a value of NOTTRT. Values should be "SCRNFAIL" for screen failures and "NOTASSGN"
    for subjects not assigned to treatment. Restricted to values in Trial Arms in
    all other cases
