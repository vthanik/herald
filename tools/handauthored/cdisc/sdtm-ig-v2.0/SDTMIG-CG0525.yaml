id: CG0525
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: RACE
check:
  narrative: RACE = 'OTHER' or RACE = 'MULTIPLE'
  condition: Sponsor collects Other, specify and chooses to map the value to SUPPDM
outcome:
  message: RACE = 'OTHER' or RACE = 'MULTIPLE'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 5.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: If the race was collected via an "Other; Specify" field and the
    sponsor chooses not to map the value as described in the current FDA guidance
    (see CDISC Notes for RACE in the domain specification) then the value of RACE
    should be 'OTHER'.
