id: CG0421
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes:
  - INT
  - EVT
  domains: ALL
  exclude_domains: []
variable: --ENRF
check:
  all:
  - operator: equal_to
    name: --OCCUR
    value: 'N'
  - operator: non_empty
    name: --ENRF
outcome:
  message: --ENRF = null
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.4 2.2.5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Identifies the end of the observation as being before; during or
    after the sponsor-defined reference period. The sponsor-defined reference period
    is a continuous period of time defined by a discrete starting point and a discrete
    ending point represented by RFSTDTC and RFENDTC in Demographics.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
