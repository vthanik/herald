  - TA
  exclude_domains: []
variable: ELEMENT
check:
  operator: is_not_unique_relationship
  name: ETCD
  value:
    related_name: ARM
outcome:
  message: ELEMENT value does not refer to any specific ARM
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 7.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: TESTRL should be expressed without referring to Arm. If the Element
    appears in more than one Arm in the Trial Arms dataset; then the Element description
    (ELEMENT) must not refer to any Arms.
