id: CG0539
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: DS
  exclude_domains: []
variable: GEN
check:
  all:
  - operator: is_contained_by
    name: DSCAT
    value:
    - DISPOSITION EVENT
  - operator: max_n_records_per_group_matching
    name: DSSCAT
    value: STUDY TREATMENT
    group_keys:
    - USUBJID
    max_n: 1
outcome:
  message: No more than 1 record per subject has DSSCAT = 'STUDY TREATMENT'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 6.2.3 DS
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Assumption 2.b.2[DSSCAT = 'STUDY TREATMENT' can be used as a generic
    identifier when a study has only a single treatment.]|Assumption 2.b.3[If a study
    has multiple treatments, then DSSCAT should name the individual treatment.]
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate

