id: CG0094
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains:
  - NOT(EX
  - AE
  - DS
  - DV
  - IE)
  exclude_domains: []
variable: --STAT
check:
  all:
  - operator: non_empty
    name: --REASND
  - operator: not_equal_to
    name: --STAT
    value: NOT DONE
outcome:
  message: --STAT = 'NOT DONE'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: Model v1.4 2.2.3
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Reason not done. Used in conjunction with --STAT when value is NOT
    DONE.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
