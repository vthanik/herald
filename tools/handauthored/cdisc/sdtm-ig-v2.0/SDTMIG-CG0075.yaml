id: CG0075
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: EVT
  domains: DV
  exclude_domains: []
variable: DVSTDTC
check:
  all:
  - operator: non_empty
    name: DVSTDTC
  - operator: less_than_by_key
    name: DVSTDTC
    reference_dataset: DM
    reference_column: RFICDTC
    key: USUBJID
outcome:
  message: DVSTDTC >= DM.RFICDTC
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 6.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: The intent of the domain is to capture protocol violations and deviations
    during the course of the study and will store only those criteria violation by
    or deviated from by the subject and not a response to each violation or deviation.
  source_version: '1'
