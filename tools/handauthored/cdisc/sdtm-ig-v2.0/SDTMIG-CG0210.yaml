id: CG0210
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: SE
  exclude_domains: []
variable: ETCD
check:
  all:
  - operator: empty
    name: SEUPDES
  - operator: equal_to
    name: ETCD
    value: UNPLAN
outcome:
  message: ETCD ^= 'UNPLAN'
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 5 SE
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: If the sponsor decides that the subject's experience for a particular
    period of time cannot be represented with one of the planned Elements, then that
    period of time should be represented as an unplanned Element. The value of ETCD
    for an unplanned Element is "UNPLAN" and SEUPDES should be populated with a description
    of the unplanned Element only if ETCD has the value of "UNPLAN".
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
