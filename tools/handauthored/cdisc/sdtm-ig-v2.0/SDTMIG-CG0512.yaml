id: CG0512
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: SPC
  domains: DM
  exclude_domains: []
variable: ACTARMCD
check:
  all:
  - name: ACTARMCD
    operator: is_not_contained_by
    value: TA.ARMCD
outcome:
  message: ACTARMCD in TA.ARMCD
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.3 5.2
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: With the exception of studies which use multi-stage arm assignments,
    must be a value of ARMCD in the Trial Arms Dataset. If the subject was not assigned
    to an arm or followed a course not described by any planned arm, ACTARMCD is null
    and ARMNRS is populated.
  source_version: '1'
