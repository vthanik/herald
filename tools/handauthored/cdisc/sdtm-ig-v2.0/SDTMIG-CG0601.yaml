variable: --OBJ
check:
  narrative: --OBJ = --TERM
  condition: Events parent record exists and DECOD = null
outcome:
  message: --OBJ = --TERM
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
