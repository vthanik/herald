id: CG0156
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: AP
  domains: ALL
  exclude_domains: []
variable: APID
check:
  all:
  - operator: missing_in_ref
    name: APID
    reference_dataset: POOLDEF
    reference_key: POOLID
outcome:
  message: APID in POOLDEF.POOLID
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: AP Guide v1.0 2.1.1
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Identifier for a single associated person, a group of associated
    persons, or a pool of associated persons. If APID identifies a pool, POOLDEF records
    must exist for each associated person.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
