id: CG0016
authority: CDISC
standard: SDTM-IG
standard_versions:
- '3.2'
- '3.3'
- '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: variable_name
check:
  all:
  - name: variable_name
    operator: not_contains_all
    value: $expected_variables
outcome:
  message: Variable present in dataset
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.2 4.1.1.5
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: When no data has been collected for an expected variable, however,
    a null column must still be included in the dataset, and a comment must be included
    in the define.xml to state that data was not collected.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000334
operations:
- id: $expected_variables
  operator: expected_variables
- id: $dataset_variables
  operator: get_column_order_from_dataset
