id: CG0664
authority: CDISC
standard: SDTM-IG
standard_versions: '3.4'
severity: Medium
scope:
  classes: ALL
  domains: ALL
  exclude_domains: []
variable: $column_order_from_dataset
check:
  all:
  - name: $column_order_from_dataset
    operator: is_not_ordered_subset_of
    value: $column_order_from_library
outcome:
  message: Variables are ordered with Identifiers first, followed by the Topic, Qualifier,
    and Timing variables. Within each role, variables are ordered as shown in SDTM
    tables in sections 3.1.1, 3.1.2, 3.1.3, 3.1.3.1, 3.1.4, and 3.1.5
  severity: Medium
provenance:
  source_document: CDISC SDTM and SDTMIG Conformance Rules v2.0
  source_document_section: IG v3.4 4.1.4
  source_url: https://www.cdisc.org/standards/foundational/sdtmig/sdtm-and-sdtmig-conformance-rules-v2-0
  cited_guidance: Variables for the 3 general observation classes must be ordered
    with Identifiers variables first, followed by Topic, Qualifier, and Timing variables.
    Within each role, variables must be ordered as shown in SDTM Sections 3.1.1, The
    Interventions Observation Class; 3.1.2, The Events Observation Class; 3.1.3, The
    Findings Observation Class; 3.1.3.1, Findings About Events or Interventions; 3.1.4,
    Identifiers for All Classes; and 3.1.5, Timing Variables for All Classes.
  source_version: '1'
  license: CC-BY-4.0
  executability: predicate
  core_crosswalk: CORE-000852
operations:
- id: $column_order_from_library
  operator: get_column_order_from_library
- id: $column_order_from_dataset
  operator: get_column_order_from_dataset
