  cited_guidance: Description of actual Arm. When an Arm is not planned (not in Trial
    Arms), ACTARM will be “Unplanned Treatment”. Randomized subjects who were not
    treated will be given a value of “Not Treated”. Values should be “Screen Failure”
    for screen failures and “Not Assigned” for subjects not assigned to treatment.
    Restricted to values in Trial Arms in all other cases.
