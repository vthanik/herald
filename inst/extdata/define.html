<script type="text/javascript">
<!--
function textContent(element,value){"use strict";var rtn;var content=element.textContent;if(value===undefined){if(content!==undefined){rtn=content;}else{rtn=element.innerText;}return rtn;}else{if(content!==undefined){element.textContent=value;}else{element.innerText=value;}}}
var ITEM='\u00A0';var CLOSE='\u25BA';var OPEN='\u25BC';
function toggle_submenu(e){"use strict";if(textContent(e)===OPEN){textContent(e,CLOSE);}else{textContent(e,OPEN);}var i;for(i=0;i<e.parentNode.childNodes.length;i++){var c;c=e.parentNode.childNodes[i];if(c.tagName==='UL'){c.style.display=(c.style.display==='none')?'block':'none';}}}
function reset_menus(){"use strict";var li;var c;var i;var j;var li_tags=document.getElementsByTagName('LI');for(i=0;i<li_tags.length;i++){li=li_tags[i];if(li.className.match('hmenu-item')){for(j=0;j<li.childNodes.length;j++){c=li.childNodes[j];if(c.tagName==='SPAN'&&c.className.match('hmenu-bullet')){textContent(c,ITEM);}}}if(li.className.match('hmenu-submenu')){for(j=0;j<li.childNodes.length;j++){c=li.childNodes[j];if(c.tagName==='SPAN'&&c.className.match('hmenu-bullet')){textContent(c,CLOSE);}else if(c.tagName==='UL'){c.style.display='none';}}}}}
function toggle_vlm(element){var child_id=element.childNodes[0].getAttribute("id");var vlm_rows=document.getElementsByClassName(child_id);for(j=0;j<vlm_rows.length;j++){if(vlm_rows[j].style.display==='none'){vlm_rows[j].style.display='';}else{vlm_rows[j].style.display='none';}}}
function expand_all_vlm(){var vlm_rows=document.getElementsByClassName("vlm");for(j=0;j<vlm_rows.length;j++){vlm_rows[j].style.display='';}}
function collapse_all_vlm(){var vlm_rows=document.getElementsByClassName("vlm");for(j=0;j<vlm_rows.length;j++){vlm_rows[j].style.display='none';}}
document.onclick=function(e){var target=e?e.target:window.event.srcElement;while(target&&!/^(a|body)$/i.test(target.nodeName)){target=target.parentNode;}if(target&&target.className.match('external')){var external=window.open(target.href);return external.closed;}}
//-->
</script>
